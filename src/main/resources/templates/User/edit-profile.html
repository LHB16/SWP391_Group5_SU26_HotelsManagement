<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Nhúng fragment head đã có sẵn bootstrap, custom css -->
<head th:replace="~{fragment/fag :: head}"></head>

<body class="d-flex flex-column profile-body-layout">
    <!-- Nhúng thanh điều hướng navBar chứa Avatar Dropdown -->
    <nav th:replace="~{fragment/fag :: navBar}"></nav>

    <!-- Khu vực hiển thị thông tin chính -->
    <main class="container mt-5 flex-grow-1">
        <div class="row">
            <!-- Cột bên trái: Thanh bên (Sidebar) chuyển đổi nhanh -->
            <div class="col-md-3 mb-4">
                <div class="profile-sidebar shadow-sm">
                    <div class="profile-sidebar-title">PROFILE MANAGEMENT</div>
                    <ul class="profile-sidebar-menu">
                        <li class="profile-sidebar-item">
                            <a th:href="@{/profile}" class="profile-sidebar-link">
                                View Profile
                            </a>
                        </li>
                        <li class="profile-sidebar-item">
                            <a th:href="@{/profile/edit}" class="profile-sidebar-link active">
                                Modify Profile
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Cột bên phải: Giao diện sửa đổi thông tin -->
            <div class="col-md-9">
                <!-- Hiển thị thông báo thành công hoặc lỗi nếu có -->
                <div th:if="${successMessage}" class="alert alert-success border-0 px-3 py-2 mb-3 profile-alert-box" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger border-0 px-3 py-2 mb-3 profile-alert-box" th:text="${errorMessage}"></div>

                <!-- Card chứa form sửa đổi. Bo góc 8px, shadow mờ nhẹ -->
                <div class="card border-0 shadow-sm mb-4 profile-card">
                    <!-- Phần header của card màu Primary Navy (#0f4c81) -->
                    <div class="card-header text-white text-center py-4 profile-card-header">
                        <h3 class="mb-1 fw-bold">Modify Profile</h3>
                        <p class="mb-0 text-white-50">Update your account information</p>
                    </div>

                    <!-- Form chỉnh sửa thông tin -->
                    <div class="card-body p-4">
                        <form th:action="@{/profile/edit}" method="POST">
                            <!-- Hiển thị Username không được chỉnh sửa -->
                            <div class="mb-3">
                                <label class="form-label text-muted fw-semibold profile-label-sm">USERNAME</label>
                                <input type="text" class="form-control profile-input-disabled" th:value="${user.username}" readonly/>
                            </div>

                            <!-- Nhập FullName mới -->
                            <div class="mb-3">
                                <label for="fullName" class="form-label text-muted fw-semibold profile-label-sm">FULL NAME</label>
                                <input type="text" class="form-control profile-input-editable" id="fullName" name="fullName" th:value="${user.fullName}" required/>
                            </div>

                            <!-- Nhập Email mới -->
                            <div class="mb-3">
                                <label for="email" class="form-label text-muted fw-semibold profile-label-sm">EMAIL ADDRESS</label>
                                <input type="email" class="form-control profile-input-editable" id="email" name="email" th:value="${user.email}" required/>
                            </div>

                            <!-- Lưu ý bảo mật chuyển đổi -->
                            <div class="alert alert-warning border-0 px-3 py-2 mb-4 profile-alert-note">
                                <strong>Note:</strong> Editing email or full name requires OTP verification.
                            </div>

                            <!-- Các nút hành động -->
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn text-white w-50 profile-btn-primary">
                                    Apply
                                </button>
                                <a th:href="@{/profile}" class="btn btn-outline-secondary w-50 profile-btn-secondary">
                                    Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Nhúng footer chân trang -->
    <footer th:replace="~{fragment/fag :: footer}"></footer>

    <!-- Nhúng thư viện scripts JS -->
    <div th:replace="~{fragment/fag :: scripts}"></div>
</body>
</html>

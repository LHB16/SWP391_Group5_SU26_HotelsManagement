<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Nhúng fragment head đã có sẵn bootstrap, custom css -->
<head th:replace="~{fragment/fag :: head}"></head>

<body class="d-flex flex-column profile-body-layout">
    <!-- Nhúng thanh điều hướng navBar chứa Avatar Dropdown -->
    <nav th:replace="~{fragment/fag :: navBar}"></nav>

    <!-- Khu vực hiển thị thông tin chính -->
    <main class="container mt-5 flex-grow-1">
        <div class="row">
            <!-- Cột bên trái: Thanh bên (Sidebar) chuyển đổi nhanh -->
            <div class="col-md-3 mb-4">
                <div class="profile-sidebar shadow-sm">
                    <div class="profile-sidebar-title">PROFILE MANAGEMENT</div>
                    <ul class="profile-sidebar-menu">
                        <li class="profile-sidebar-item">
                            <a th:href="@{/profile}" class="profile-sidebar-link active">
                                Profile Information
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Cột bên phải: Giao diện hiển thị chi tiết thông tin và sửa đổi trực tiếp từng trường -->
            <div class="col-md-9">
                <!-- Hiển thị thông báo thành công hoặc lỗi nếu có -->
                <div th:if="${successMessage}" class="alert alert-success border-0 px-3 py-2 mb-3 profile-alert-box" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger border-0 px-3 py-2 mb-3 profile-alert-box" th:text="${errorMessage}"></div>

                <!-- --- CHẾ ĐỘ ĐỔI MẬT KHẨU (PASSWORD MODE) --- -->
                <div th:if="${session.profileVerifiedForEdit == true && session.editField == 'password'}" class="card border-0 shadow-sm mb-4 profile-card">
                    <!-- Phần header của card đổi mật khẩu -->
                    <div class="card-header text-white text-center py-4 profile-card-header">
                        <h3 class="mb-1 fw-bold">Change Password</h3>
                        <p class="mb-0 text-white-50">Update your account password</p>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/profile/change-password}" method="POST">
                            <!-- Nhập Mật khẩu hiện tại -->
                            <div class="mb-3">
                                <label for="currentPassword" class="form-label text-muted fw-semibold profile-label-sm">CURRENT PASSWORD</label>
                                <input type="password" class="form-control profile-input-editable" id="currentPassword" name="currentPassword" required placeholder="Enter current password"/>
                            </div>
                            <!-- Nhập Mật khẩu mới -->
                            <div class="mb-3">
                                <label for="newPassword" class="form-label text-muted fw-semibold profile-label-sm">NEW PASSWORD</label>
                                <input type="password" class="form-control profile-input-editable" id="newPassword" name="newPassword" required placeholder="Enter new password"/>
                            </div>
                            <!-- Xác nhận Mật khẩu mới -->
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label text-muted fw-semibold profile-label-sm">CONFIRM NEW PASSWORD</label>
                                <input type="password" class="form-control profile-input-editable" id="confirmPassword" name="confirmPassword" required placeholder="Confirm new password"/>
                            </div>
                            <!-- Các nút hành động -->
                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn text-white w-50 profile-btn-primary">
                                    Update Password
                                </button>
                                <a th:href="@{/profile/cancel-edit}" class="btn btn-outline-secondary w-50 profile-btn-secondary">
                                    Cancel
                                </a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- --- CHẾ ĐỘ XEM / SỬA PROFILE THÔNG THƯỜNG --- -->
                <div th:if="${session.profileVerifiedForEdit != true || session.editField != 'password'}" class="card border-0 shadow-sm mb-4 profile-card">
                    <!-- Phần header của card có màu nền Primary Navy (#0f4c81) -->
                    <div class="card-header text-white text-center py-4 profile-card-header">
                        <!-- Avatar lớn ở trang Profile -->
                        <div class="mx-auto mb-3 d-flex align-items-center justify-content-center profile-avatar-lg">
                            <span th:text="${#strings.substring(user.fullName, 0, 1).toUpperCase()}">U</span>
                        </div>
                        <h3 class="mb-0 fw-bold" th:text="${user.fullName}">Full Name</h3>
                    </div>

                    <div class="card-body p-4">
                        <!-- 1. USERNAME: Luôn là chỉ đọc -->
                        <div class="mb-4">
                            <label class="form-label text-muted fw-semibold profile-label-sm">USERNAME</label>
                            <input type="text" class="form-control profile-input-readonly" th:value="${user.username}" readonly/>
                        </div>

                        <!-- 2. FULL NAME -->
                        <div class="mb-4">
                            <label class="form-label text-muted fw-semibold profile-label-sm">FULL NAME</label>
                            
                            <!-- Chế độ xem Full Name (Không ở trạng thái sửa Full Name) -->
                            <div th:if="${session.profileVerifiedForEdit != true || session.editField != 'fullName'}" class="input-group">
                                <input type="text" class="form-control profile-input-readonly" th:value="${user.fullName}" readonly style="border-right: none;"/>
                                <a th:href="@{/profile/edit-request(field='fullName')}" class="btn d-flex align-items-center justify-content-center" title="Edit Full Name" style="border: 1px solid #eff4ff; border-left: none; background-color: #f8f9ff; color: #0f4c81; padding-left: 12px; padding-right: 12px;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pencil"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                                </a>
                            </div>

                            <!-- Chế độ sửa Full Name (Đang mở khóa sửa Full Name) -->
                            <div th:if="${session.profileVerifiedForEdit == true && session.editField == 'fullName'}">
                                <form th:action="@{/profile/save-fullname}" method="POST">
                                    <input type="text" class="form-control profile-input-editable mb-2" id="fullName" name="fullName" th:value="${user.fullName}" required/>
                                    <div class="d-flex gap-2">
                                        <button type="submit" class="btn btn-sm text-white profile-btn-primary" style="width: 100px;">
                                            Save
                                        </button>
                                        <a th:href="@{/profile/cancel-edit}" class="btn btn-sm btn-outline-secondary profile-btn-secondary" style="width: 100px;">
                                            Cancel
                                        </a>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <!-- 3. EMAIL ADDRESS -->
                        <div class="mb-4">
                            <label class="form-label text-muted fw-semibold profile-label-sm">EMAIL ADDRESS</label>
                            
                            <!-- Chế độ xem Email (Không ở trạng thái sửa Email) -->
                            <div th:if="${session.profileVerifiedForEdit != true || session.editField != 'email'}" class="input-group">
                                <input type="text" class="form-control profile-input-readonly" th:value="${user.email}" readonly style="border-right: none;"/>
                                <a th:href="@{/profile/edit-request(field='email')}" class="btn d-flex align-items-center justify-content-center" title="Edit Email" style="border: 1px solid #eff4ff; border-left: none; background-color: #f8f9ff; color: #0f4c81; padding-left: 12px; padding-right: 12px;">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pencil"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                                </a>
                            </div>

                            <!-- Chế độ nhập Email mới (Đang mở khóa sửa Email) -->
                            <div th:if="${session.profileVerifiedForEdit == true && session.editField == 'email'}">
                                <form th:action="@{/profile/request-new-email}" method="POST">
                                    <input type="email" class="form-control profile-input-editable mb-2" id="email" name="email" th:value="${user.email}" required placeholder="Enter new email address"/>
                                    <div class="d-flex gap-2">
                                        <button type="submit" class="btn btn-sm text-white profile-btn-primary" style="width: 150px;">
                                            Verify New Email
                                        </button>
                                        <a th:href="@{/profile/cancel-edit}" class="btn btn-sm btn-outline-secondary profile-btn-secondary" style="width: 100px;">
                                            Cancel
                                        </a>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <!-- Nút Change Password ở dưới cùng (chỉ hiển thị khi đang ở chế độ xem thông tin bình thường) -->
                        <div th:if="${session.profileVerifiedForEdit != true}" class="mt-4">
                            <a th:href="@{/profile/edit-request(field='password')}" class="btn text-white w-100 profile-btn-primary" style="background-color: #0f4c81; padding: 10px; border-radius: 8px;">
                                Change Password
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Nhúng footer chân trang -->
    <footer th:replace="~{fragment/fag :: footer}"></footer>

    <!-- Nhúng thư viện scripts JS (bao gồm cả main.js của Dropdown Avatar) -->
    <div th:replace="~{fragment/fag :: scripts}"></div>
</body>
</html>

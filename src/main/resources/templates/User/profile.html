<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Nhúng fragment head đã có sẵn bootstrap, custom css -->
<head th:replace="~{fragment/frag :: head}"></head>

<body class="d-flex flex-column profile-body-layout">
    <!-- Nhúng thanh điều hướng navBar chứa Avatar Dropdown -->
    <nav th:replace="~{fragment/frag :: navBar}"></nav>

    <!-- Khu vực hiển thị thông tin chính -->
    <main class="container mt-5 flex-grow-1 profile-container">
        <div class="row">
            <div class="col-lg-12 mx-auto">
                <!-- Global Popups -->
                <th:block th:replace="~{fragment/frag :: alerts}"></th:block>

                <!-- Tiêu đề Profile ở trên cùng -->
                <div class="bh-content-header mb-4">
                    <div class="bh-content-title" style="color: #0a1628; font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700;">Profile</div>
                </div>

                <div class="row g-4">
                    <!-- Cột Trái: Thông tin tổng quan (Quick Info Card) -->
                    <div class="col-lg-4">
                        <div class="card border-0 shadow-sm p-4 text-center" style="border-radius: 12px; background-color: #ffffff; border: 1px solid #eff4ff !important;">
                            <div class="d-flex flex-column align-items-center">
                                <!-- Tên đầy đủ -->
                                <h4 class="fw-bold mb-3" style="color: #0a1628; font-family: 'Playfair Display', serif; margin-top: 10px;" th:text="${user.fullName}">Full Name</h4>
                                
                                <!-- Badge Vai trò (Role) -->
                                <span class="badge px-3 py-2" 
                                      style="border-radius: 20px; font-size: 12px; font-weight: 600; background-color: rgba(201, 169, 110, 0.15); color: #a8824e; border: 1px solid rgba(201, 169, 110, 0.3);"
                                      th:text="${user.role}">ROLE</span>
                            </div>
                        </div>
                    </div>

                    <!-- Cột Phải: Biểu mẫu thông tin chi tiết -->
                    <div class="col-lg-8">
                        <div class="card border-0 shadow-sm" style="border-radius: 12px; background-color: #ffffff; border: 1px solid #eff4ff !important; overflow: hidden;">
                            <!-- Header Card -->
                            <div class="card-header border-0 py-3 px-4 d-flex align-items-center gap-2" style="background-color: #0a1628;">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c9a96e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user-cog"><circle cx="18" cy="15" r="3"/><circle cx="9" cy="7" r="4"/><path d="M10 15H6a4 4 0 0 0-4 4v2h10"/><path d="m21.7 16.4-.9-.3"/><path d="m15.2 13.9-.9-.3"/><path d="m16.6 18.7.3-.9"/><path d="m19.1 12.2.3-.9"/><path d="m20 13.7.7-.7"/><path d="m16 16.3.7-.7"/><path d="m16.7 14.3-.7-.7"/><path d="m20 15.7-.7-.7"/></svg>
                                <h5 class="card-title mb-0 text-white fw-semibold" style="font-size: 16px;"
                                    th:text="${session.profileVerifiedForEdit == true && session.editField == 'password' ? 'Security & Password Settings' : 'Personal Information'}">
                                    Account Profile
                                </h5>
                            </div>
                            
                            <div class="card-body p-4">
                                <div class="profile-content-area-flat">
                                    <!-- --- CHẾ ĐỘ ĐỔI MẬT KHẨU (PASSWORD MODE) --- -->
                                    <div th:if="${session.profileVerifiedForEdit == true && session.editField == 'password'}" class="profile-form-wrapper">
                                        <form th:action="@{/profile/change-password}" method="POST">
                                            <!-- Nhập Mật khẩu hiện tại -->
                                            <div class="mb-3">
                                                <label for="currentPassword" class="form-label text-muted fw-semibold profile-label-sm d-flex align-items-center gap-2">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-lock"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                                    CURRENT PASSWORD
                                                </label>
                                                <input type="password" class="form-control profile-input-editable" id="currentPassword" name="currentPassword" required placeholder="Enter current password" style="border-color: #cbd5e1 !important;"/>
                                            </div>
                                            <!-- Nhập Mật khẩu mới -->
                                            <div class="mb-3">
                                                <label for="newPassword" class="form-label text-muted fw-semibold profile-label-sm d-flex align-items-center gap-2">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-key-round"><path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4L2 18Z"/><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"/></svg>
                                                    NEW PASSWORD
                                                </label>
                                                <input type="password" class="form-control profile-input-editable" id="newPassword" name="newPassword" required placeholder="Enter new password" style="border-color: #cbd5e1 !important;"/>
                                            </div>
                                            <!-- Xác nhận Mật khẩu mới -->
                                            <div class="mb-3">
                                                <label for="confirmPassword" class="form-label text-muted fw-semibold profile-label-sm d-flex align-items-center gap-2">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shield-alert"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
                                                    CONFIRM NEW PASSWORD
                                                </label>
                                                <input type="password" class="form-control profile-input-editable" id="confirmPassword" name="confirmPassword" required placeholder="Confirm new password" style="border-color: #cbd5e1 !important;"/>
                                            </div>
                                            <!-- Các nút hành động -->
                                            <div class="d-flex gap-2 mt-4">
                                                <button type="submit" class="btn text-white profile-btn-primary d-flex align-items-center gap-2" style="background-color: #0a1628 !important; border-color: #0a1628 !important;">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-save"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                                                    Update Password
                                                </button>
                                                <a th:href="@{/profile/cancel-edit}" class="btn btn-outline-secondary profile-btn-secondary d-flex align-items-center gap-2">
                                                    Cancel
                                                </a>
                                            </div>
                                        </form>
                                    </div>

                                    <!-- --- CHẾ ĐỘ XEM / SỬA PROFILE THÔNG THƯỜNG --- -->
                                    <div th:if="${session.profileVerifiedForEdit != true || session.editField != 'password'}" class="profile-form-wrapper">
                                        
                                        <!-- 1. USERNAME: Luôn là chỉ đọc -->
                                        <div class="mb-4">
                                            <label class="form-label text-muted fw-semibold profile-label-sm d-flex align-items-center gap-2">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-user"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                                                USERNAME
                                            </label>
                                            <input type="text" class="form-control profile-input-readonly" th:value="${user.username}" readonly style="background-color: #f8fafc !important; cursor: not-allowed; border-color: #e2e8f0 !important;"/>
                                        </div>

                                        <!-- 2. FULL NAME -->
                                        <div class="mb-4" id="fullname-container">
                                            <label class="form-label text-muted fw-semibold profile-label-sm d-flex align-items-center gap-2">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-tag"><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l4.72-4.72c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M6 8h.01"/></svg>
                                                FULL NAME
                                            </label>
                                            
                                            <!-- Chế độ xem Full Name -->
                                            <div id="fullname-view-group" class="input-group" style="display: flex;">
                                                <input type="text" id="fullname-display-input" class="form-control profile-input-readonly" th:value="${user.fullName}" readonly style="border-right: none; background-color: #f8fafc !important; border-color: #e2e8f0 !important;"/>
                                                <button type="button" id="btn-edit-fullname" class="btn d-flex align-items-center justify-content-center" title="Edit Full Name" style="border: 1px solid #e2e8f0; border-left: none; background-color: #f8fafc; color: #0a1628; padding-left: 14px; padding-right: 14px; border-top-right-radius: 8px; border-bottom-right-radius: 8px;">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pencil"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                                                </button>
                                            </div>

                                            <!-- Chế độ sửa Full Name -->
                                            <div id="fullname-edit-group" style="display: none;">
                                                <input type="text" class="form-control profile-input-editable mb-2" id="fullname-edit-input" th:value="${user.fullName}" required style="border-color: #0a1628 !important;"/>
                                                <div class="d-flex gap-2">
                                                    <button type="button" id="btn-save-fullname" class="btn btn-sm text-white profile-btn-primary d-flex align-items-center gap-2" style="width: auto; padding: 8px 16px !important; background-color: #0a1628 !important; border-color: #0a1628 !important;">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-save"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                                                        Save
                                                    </button>
                                                    <button type="button" id="btn-cancel-fullname" class="btn btn-sm btn-outline-secondary profile-btn-secondary d-flex align-items-center justify-content-center" style="width: auto; padding: 8px 16px !important;">
                                                        Cancel
                                                    </button>
                                                </div>
                                                <span id="fullname-error-msg" class="text-danger small mt-1" style="display: none;"></span>
                                            </div>
                                        </div>

                                        <!-- 2.5 PHONE NUMBER -->
                                        <div class="mb-4" id="phone-container">
                                            <label class="form-label text-muted fw-semibold profile-label-sm d-flex align-items-center gap-2">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-phone"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                                                PHONE NUMBER
                                            </label>
                                            
                                            <!-- Chế độ xem Phone -->
                                            <div id="phone-view-group" class="input-group" style="display: flex;">
                                                <input type="text" id="phone-display-input" class="form-control profile-input-readonly" th:value="${user.phone}" readonly style="border-right: none; background-color: #f8fafc !important; border-color: #e2e8f0 !important;"/>
                                                <button type="button" id="btn-edit-phone" class="btn d-flex align-items-center justify-content-center" title="Edit Phone Number" style="border: 1px solid #e2e8f0; border-left: none; background-color: #f8fafc; color: #0a1628; padding-left: 14px; padding-right: 14px; border-top-right-radius: 8px; border-bottom-right-radius: 8px;">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pencil"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                                                </button>
                                            </div>

                                            <!-- Chế độ sửa Phone -->
                                            <div id="phone-edit-group" style="display: none;">
                                                <input type="tel" class="form-control profile-input-editable mb-2" id="phone-edit-input" th:value="${user.phone}" required style="border-color: #0a1628 !important;"/>
                                                <div class="d-flex gap-2 mt-2">
                                                    <button type="button" id="btn-save-phone" class="btn btn-sm text-white profile-btn-primary d-flex align-items-center gap-2" style="width: auto; padding: 8px 16px !important; background-color: #0a1628 !important; border-color: #0a1628 !important;">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-save"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                                                        Save
                                                    </button>
                                                    <button type="button" id="btn-cancel-phone" class="btn btn-sm btn-outline-secondary profile-btn-secondary d-flex align-items-center justify-content-center" style="width: auto; padding: 8px 16px !important;">
                                                        Cancel
                                                    </button>
                                                </div>
                                                <span id="phone-error-msg" class="text-danger small mt-1" style="display: none;"></span>
                                            </div>
                                        </div>

                                        <!-- 3. EMAIL ADDRESS -->
                                        <div class="mb-4">
                                            <label class="form-label text-muted fw-semibold profile-label-sm d-flex align-items-center gap-2">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                                                EMAIL ADDRESS
                                            </label>
                                            
                                            <!-- Chế độ xem Email (Không ở trạng thái sửa Email) -->
                                            <div th:if="${session.profileVerifiedForEdit != true || session.editField != 'email'}" class="input-group">
                                                <input type="text" class="form-control profile-input-readonly" th:value="${user.email}" readonly style="border-right: none; background-color: #f8fafc !important; border-color: #e2e8f0 !important;"/>
                                                <a th:href="@{/profile/edit-request(field='email')}" class="btn d-flex align-items-center justify-content-center" title="Edit Email" style="border: 1px solid #e2e8f0; border-left: none; background-color: #f8fafc; color: #0a1628; padding-left: 14px; padding-right: 14px; border-top-right-radius: 8px; border-bottom-right-radius: 8px;">
                                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-pencil"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                                                </a>
                                            </div>

                                            <!-- Chế độ nhập Email mới (Đang mở khóa sửa Email) -->
                                            <div th:if="${session.profileVerifiedForEdit == true && session.editField == 'email'}">
                                                <form th:action="@{/profile/request-new-email}" method="POST">
                                                    <input type="email" class="form-control profile-input-editable mb-2" id="email" name="email" th:value="${user.email}" required placeholder="Enter new email address" style="border-color: #0a1628 !important;"/>
                                                    <div class="d-flex gap-2">
                                                        <button type="submit" class="btn btn-sm text-white profile-btn-primary d-flex align-items-center gap-2" style="width: auto; padding: 8px 16px !important; background-color: #0a1628 !important; border-color: #0a1628 !important;">
                                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                                                            Verify New Email
                                                        </button>
                                                        <a th:href="@{/profile/cancel-edit}" class="btn btn-sm btn-outline-secondary profile-btn-secondary d-flex align-items-center justify-content-center" style="width: auto; padding: 8px 16px !important;">
                                                            Cancel
                                                        </a>
                                                    </div>
                                                </form>
                                            </div>
                                        </div>

                                        <!-- Nút Change Password ở dưới cùng (chỉ hiển thị khi đang ở chế độ xem thông tin bình thường) -->
                                        <div th:if="${session.profileVerifiedForEdit != true}" class="mt-4 pt-2">
                                            <a th:href="@{/profile/edit-request(field='password')}" class="btn text-white profile-btn-primary text-center d-flex align-items-center justify-content-center gap-2 w-100" style="background-color: #0a1628 !important; border-color: #0a1628 !important; padding: 12px; border-radius: 8px; font-weight: 500;">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-key-round"><path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4L2 18Z"/><circle cx="16.5" cy="7.5" r=".5" fill="currentColor"/></svg>
                                                Change Password
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Nhúng footer chân trang -->
    <footer th:replace="~{fragment/frag :: footer}"></footer>

    <!-- Modal Thông báo thành công hiển thị ở chính giữa màn hình -->
    <div th:if="${successMessage != null && bookings != null}" class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow border-0" style="border-radius: 14px;">
                <div class="modal-body text-center p-4">
                    <div class="mb-3" style="color: #10b981;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="54" height="54" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-check-circle"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
                    </div>
                    <h4 class="modal-title fw-bold mb-2" id="successModalLabel" style="color: #0f172a;">Success!</h4>
                    <p class="text-muted mb-4" th:text="${successMessage}">Action completed successfully.</p>
                    <button type="button" class="btn text-white w-100" data-bs-dismiss="modal" 
                            style="background-color: #0f4c81; border-radius: 8px; font-weight: 600; padding: 10px;">
                        OK
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Xác nhận Hủy đơn hàng -->
    <div th:if="${bookings != null}" class="modal fade" id="cancelConfirmModal" tabindex="-1" aria-labelledby="cancelConfirmModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow border-0" style="border-radius: 14px;">
                <div class="modal-body text-center p-4">
                    <div class="mb-3" id="cancelModalIcon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="54" height="54" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-alert-triangle"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
                    </div>
                    <h4 class="modal-title fw-bold mb-2" id="cancelConfirmModalLabel" style="color: #0f172a;">Cancel Booking?</h4>
                    <p class="mb-1" id="cancelModalMessage" style="color: #64748b;"></p>
                    <div id="cancelRefundBadge" class="mb-4" style="display:inline-block; margin-top:8px; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 700;"></div>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-light w-50" data-bs-dismiss="modal" style="border-radius: 8px; font-weight: 600; padding: 10px;">
                            No, keep it
                        </button>
                        <button type="button" id="confirmCancelBtn" class="btn text-white w-50" style="background-color: #b91c1c; border-radius: 8px; font-weight: 600; padding: 10px;">
                            Yes, cancel
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Thông báo lỗi (như hết hạn thanh toán) hiển thị ở chính giữa màn hình -->
    <div th:if="${errorMessage != null && bookings != null}" class="modal fade" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow border-0" style="border-radius: 14px;">
                <div class="modal-body text-center p-4">
                    <div class="mb-3" style="color: #ef4444;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="54" height="54" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-alert-circle"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
                    </div>
                    <h4 class="modal-title fw-bold mb-2" id="errorModalLabel" style="color: #0f172a;">Error</h4>
                    <p class="text-muted mb-4" th:text="${errorMessage}">An error occurred.</p>
                    <button type="button" class="btn text-white w-100" data-bs-dismiss="modal" 
                            style="background-color: #ef4444; border-radius: 8px; font-weight: 600; padding: 10px;">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Nhúng thư viện scripts JS (bao gồm cả main.js của Dropdown Avatar) -->
    <div th:replace="~{fragment/frag :: scripts}"></div>

    <script type="text/javascript" th:if="${bookings != null}">
        document.addEventListener("DOMContentLoaded", function () {
            // 1. Tự động hiển thị modal thành công nếu có successMessage
            var successModalEl = document.getElementById('successModal');
            if (successModalEl) {
                var mySuccessModal = new bootstrap.Modal(successModalEl);
                mySuccessModal.show();
            }

            // 1b. Tự động hiển thị modal lỗi nếu có errorMessage
            var errorModalEl = document.getElementById('errorModal');
            if (errorModalEl) {
                var myErrorModal = new bootstrap.Modal(errorModalEl);
                myErrorModal.show();
            }

            // Lưu trữ bookingId chuẩn bị thực hiện action
            var activeBookingId = null;

            // 2. Xử lý hiển thị modal hủy đặt phòng
            var cancelModalEl = document.getElementById('cancelConfirmModal');
            if (cancelModalEl) {
                var cancelModal = new bootstrap.Modal(cancelModalEl);
                document.querySelectorAll('.trigger-cancel-btn').forEach(function(button) {
                    button.addEventListener('click', function(e) {
                        activeBookingId = this.getAttribute('data-booking-id');

                        // Đọc chính sách hoàn tiền từ data attribute
                        var policy = this.getAttribute('data-refund-policy');
                        var msgEl   = document.getElementById('cancelModalMessage');
                        var iconEl  = document.getElementById('cancelModalIcon');
                        var badgeEl = document.getElementById('cancelRefundBadge');

                        if (policy === 'full') {
                            iconEl.style.color  = '#d97706';
                            msgEl.textContent   = 'Are you sure you want to cancel this booking?';
                            badgeEl.textContent = 'Full refund (100%) will be processed';
                            badgeEl.style.background = '#ecfdf5';
                            badgeEl.style.color = '#047857';
                            badgeEl.style.border = '1px solid #a7f3d0';
                        } else {
                            iconEl.style.color  = '#ef4444';
                            msgEl.textContent   = 'This booking is within 3 days of check-in. Cancellations in this period are non-refundable.';
                            badgeEl.textContent = 'No refund will be issued (0%)';
                            badgeEl.style.background = '#fef2f2';
                            badgeEl.style.color = '#b91c1c';
                            badgeEl.style.border = '1px solid #fecaca';
                        }

                        cancelModal.show();
                    });
                });
            }

            var confirmCancelBtnEl = document.getElementById('confirmCancelBtn');
            if (confirmCancelBtnEl) {
                confirmCancelBtnEl.addEventListener('click', function() {
                    if (activeBookingId) {
                        window.location.href = '/booking/cancel-policy?bookingId=' + activeBookingId;
                    }
                });
            }
        });
    </script>

    <!-- Flatpickr cho bộ lọc ngày Check-in / Check-out -->
    <script th:inline="javascript" th:if="${bookings != null}">
        document.addEventListener("DOMContentLoaded", function() {
            const checkinVal = /*[[${selectedCheckIn}]]*/ '';
            const checkoutVal = /*[[${selectedCheckOut}]]*/ '';

            // Khởi tạo flatpickr cho Check-in Date
            const checkinPicker = flatpickr("#filterCheckIn", {
                dateFormat: "Y-m-d",
                altInput: true,
                altFormat: "d/m/Y",
                altInputClass: "form-control profile-input-editable",
                allowInput: false,
                defaultDate: checkinVal ? checkinVal : null,
                onChange: function(selectedDates, dateStr) {
                    if (selectedDates[0]) {
                        // Đặt minDate cho checkout = ngày sau check-in
                        const nextDay = new Date(selectedDates[0]);
                        nextDay.setDate(nextDay.getDate() + 1);
                        checkoutPicker.set("minDate", nextDay);

                        // Nếu checkout hiện tại <= check-in mới → tự động đặt lại
                        const currentCheckout = checkoutPicker.selectedDates[0];
                        if (currentCheckout && currentCheckout <= selectedDates[0]) {
                            checkoutPicker.setDate(nextDay);
                        }
                    }
                }
            });

            // Khởi tạo flatpickr cho Check-out Date
            const checkoutPicker = flatpickr("#filterCheckOut", {
                dateFormat: "Y-m-d",
                altInput: true,
                altFormat: "d/m/Y",
                altInputClass: "form-control profile-input-editable",
                allowInput: false,
                minDate: checkinVal ? new Date(new Date(checkinVal).getTime() + 86400000) : null,
                defaultDate: checkoutVal ? checkoutVal : null
            });
        });
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const btnEditPhone = document.getElementById("btn-edit-phone");
            const btnCancelPhone = document.getElementById("btn-cancel-phone");
            const btnSavePhone = document.getElementById("btn-save-phone");
            const phoneViewGroup = document.getElementById("phone-view-group");
            const phoneEditGroup = document.getElementById("phone-edit-group");
            const phoneDisplayInput = document.getElementById("phone-display-input");
            const phoneEditInput = document.getElementById("phone-edit-input");
            const phoneErrorMsg = document.getElementById("phone-error-msg");

            let itiPhone;
            if (phoneEditInput) {
                itiPhone = window.intlTelInput(phoneEditInput, {
                    initialCountry: "vn",
                    preferredCountries: ["vn"],
                    separateDialCode: false,
                    nationalMode: false,
                    utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"
                });
            }

            if (btnEditPhone && btnCancelPhone && btnSavePhone) {
                // Toggle to edit mode
                btnEditPhone.addEventListener("click", function() {
                    phoneViewGroup.style.display = "none";
                    phoneEditGroup.style.display = "block";
                    phoneErrorMsg.style.display = "none";
                    phoneEditInput.focus();
                    if (itiPhone) {
                        itiPhone.setNumber(phoneEditInput.value); // Re-sync in case format is modified
                    }
                });

                // Cancel edit mode
                btnCancelPhone.addEventListener("click", function() {
                    phoneEditInput.value = phoneDisplayInput.value; // Reset value
                    if (itiPhone) {
                        itiPhone.setNumber(phoneDisplayInput.value);
                    }
                    phoneViewGroup.style.display = "flex";
                    phoneEditGroup.style.display = "none";
                    phoneErrorMsg.style.display = "none";
                });

                // Save phone via AJAX
                btnSavePhone.addEventListener("click", function() {
                    const phoneValue = itiPhone ? itiPhone.getNumber() : phoneEditInput.value.trim();
                    if (!phoneValue) {
                        phoneErrorMsg.textContent = "Phone number is required.";
                        phoneErrorMsg.style.display = "block";
                        return;
                    }

                    btnSavePhone.disabled = true;
                    phoneErrorMsg.style.display = "none";

                    const formData = new URLSearchParams();
                    formData.append("phone", phoneValue);

                    // Extract CSRF token if present on the page
                    const csrfToken = document.querySelector('input[name="_csrf"]')?.value;
                    if (csrfToken) {
                        formData.append("_csrf", csrfToken);
                    }

                    fetch("/profile/save-phone", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/x-www-form-urlencoded"
                        },
                        body: formData
                    })
                    .then(response => {
                        if (response.ok) {
                            return response.text();
                        } else {
                            throw new Error("Failed to update phone number.");
                        }
                    })
                    .then(data => {
                        // Success: Update UI without page reload
                        phoneDisplayInput.value = phoneValue;
                        if (itiPhone) {
                            itiPhone.setNumber(phoneValue);
                        }
                        phoneViewGroup.style.display = "flex";
                        phoneEditGroup.style.display = "none";
                        btnSavePhone.disabled = false;
                        alert("Phone number updated successfully!");
                    })
                    .catch(error => {
                        phoneErrorMsg.textContent = error.message;
                        phoneErrorMsg.style.display = "block";
                        btnSavePhone.disabled = false;
                    });
                });
            }

            // JS xử lý cho Full Name (AJAX)
            const btnEditFullname = document.getElementById("btn-edit-fullname");
            const btnCancelFullname = document.getElementById("btn-cancel-fullname");
            const btnSaveFullname = document.getElementById("btn-save-fullname");
            const fullnameViewGroup = document.getElementById("fullname-view-group");
            const fullnameEditGroup = document.getElementById("fullname-edit-group");
            const fullnameDisplayInput = document.getElementById("fullname-display-input");
            const fullnameEditInput = document.getElementById("fullname-edit-input");
            const fullnameErrorMsg = document.getElementById("fullname-error-msg");
            const quickInfoFullname = document.querySelector(".col-lg-4 h4.fw-bold");

            if (btnEditFullname && btnCancelFullname && btnSaveFullname) {
                btnEditFullname.addEventListener("click", function() {
                    fullnameViewGroup.style.display = "none";
                    fullnameEditGroup.style.display = "block";
                    fullnameErrorMsg.style.display = "none";
                    fullnameEditInput.focus();
                });

                btnCancelFullname.addEventListener("click", function() {
                    fullnameEditInput.value = fullnameDisplayInput.value;
                    fullnameViewGroup.style.display = "flex";
                    fullnameEditGroup.style.display = "none";
                    fullnameErrorMsg.style.display = "none";
                });

                btnSaveFullname.addEventListener("click", function() {
                    const fullnameValue = fullnameEditInput.value.trim();
                    if (!fullnameValue) {
                        fullnameErrorMsg.textContent = "Full name is required.";
                        fullnameErrorMsg.style.display = "block";
                        return;
                    }

                    btnSaveFullname.disabled = true;
                    fullnameErrorMsg.style.display = "none";

                    const formData = new URLSearchParams();
                    formData.append("fullName", fullnameValue);

                    const csrfToken = document.querySelector('input[name="_csrf"]')?.value;
                    if (csrfToken) {
                        formData.append("_csrf", csrfToken);
                    }

                    fetch("/profile/save-fullname", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/x-www-form-urlencoded"
                        },
                        body: formData
                    })
                    .then(response => {
                        if (response.ok) {
                            return response.text();
                        } else {
                            throw new Error("Failed to update full name.");
                        }
                    })
                    .then(data => {
                        fullnameDisplayInput.value = fullnameValue;
                        if (quickInfoFullname) {
                            quickInfoFullname.textContent = fullnameValue;
                        }
                        fullnameViewGroup.style.display = "flex";
                        fullnameEditGroup.style.display = "none";
                        btnSaveFullname.disabled = false;
                        alert("Full name updated successfully!");
                    })
                    .catch(error => {
                        fullnameErrorMsg.textContent = error.message;
                        fullnameErrorMsg.style.display = "block";
                        btnSaveFullname.disabled = false;
                    });
                });
            }
        });
    </script>
</body>

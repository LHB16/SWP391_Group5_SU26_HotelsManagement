<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Booking Hotels</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link th:href="@{/assets/css/style.css}" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"/>
</head>

<nav th:fragment="navBar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Booking Hotels</a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <th:block th:if="${session.loggedInUser == null || session.loggedInUser.role != 'ADMIN'}">
                    <!-- Home / Dashboard cho Owner -->
                    <li class="nav-item" th:if="${session.loggedInUser != null && session.loggedInUser.role == 'HOTEL_OWNER'}">
                        <a class="nav-link"
                           th:href="@{/owner/dashboard}">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/hotels}">Hotels</a>
                    </li>
                </th:block>
                <th:block th:if="${session.loggedInUser != null && session.loggedInUser.role == 'ADMIN'}">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/dashboard}">Admin Dashboard</a>
                    </li>
                </th:block>
                <th:block th:if="${session.loggedInUser != null && session.loggedInUser.role == 'HOTEL_OWNER'}">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/chat/inbox}">Inbox</a>
                    </li>
                </th:block>
            </ul>
            <ul class="navbar-nav ms-auto align-items-center gap-2">
                <th:block th:if="${session.loggedInUser == null}">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/login}">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-success btn-sm" th:href="@{/register}">Register</a>
                    </li>
                </th:block>
                <th:block th:if="${session.loggedInUser != null}">
                    <!-- Dropdown chứa Avatar và Menu thả xuống -->
                    <li class="nav-item avatar-dropdown">
                        <!-- Nút Avatar hiển thị tên đầy đủ của người dùng -->
                        <div class="avatar-btn" id="avatarBtn"
                             th:text="${session.loggedInUser.fullName}">User</div>

                        <!-- Menu thả xuống chứa các lựa chọn -->
                        <div class="avatar-menu" id="avatarMenu">
                            <div class="px-3 py-2 text-muted border-bottom" style="font-size: 13px;">
                                Hi, <span th:text="${session.loggedInUser.fullName}">User</span>
                            </div>
                            <!-- Nút Profile như yêu cầu -->
                            <a class="avatar-menu-item" th:href="@{/profile}">Profile</a>
                            <!-- Nút Wishlist -->
                            <a class="avatar-menu-item" th:if="${session.loggedInUser.role != 'ADMIN' && session.loggedInUser.role != 'HOTEL_OWNER'}" th:href="@{/wishlist}">Wishlist</a>
                            <!-- Nút Booking History -->
                            <a class="avatar-menu-item" th:if="${session.loggedInUser.role != 'ADMIN' && session.loggedInUser.role != 'HOTEL_OWNER'}" th:href="@{/booking/history}">Booking History</a>
                            <div class="avatar-menu-divider"></div>
                            <!-- Nút Logout -->
                            <a class="avatar-menu-item" th:href="@{/logout}" style="color: #ef4444;">Logout</a>
                        </div>
                    </li>
                </th:block>
            </ul>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="bg-dark text-white text-center py-3 mt-auto">
    <small>&copy; 2026 Booking Hotels</small>
</footer>

<th:block th:fragment="scripts">
    <script th:src="@{/assets/js/bootstrap.bundle.js}"></script>
    <!-- Nhúng Javascript tùy chỉnh cho Avatar Dropdown -->
    <script th:src="@{/assets/js/main.js}"></script>
    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</th:block>

<!-- Thêm vào phần nav của Hotel Owner trong frag.html -->
<th:block th:if="${session.loggedInUser != null && session.loggedInUser.role == 'HOTEL_OWNER'}">
    <li class="nav-item">
        <a class="nav-link" th:href="@{/owner/hotels}">
            <i class="bi bi-building me-1"></i> My Hotels
        </a>
    </li>
    <li class="nav-item">
        <a class="nav-link" th:href="@{/owner/dashboard}">
            <i class="bi bi-speedometer2 me-1"></i> Dashboard
        </a>
    </li>
</th:block>

<th:block th:fragment="alerts">
    <!-- Success Modal -->
    <div th:if="${successMessage}" class="modal fade" id="globalSuccessModal" tabindex="-1" aria-labelledby="globalSuccessModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow border-0" style="border-radius: 14px;">
                <div class="modal-body text-center p-4">
                    <div class="mb-3" style="color: #10b981; font-size: 54px;">
                        <i class="bi bi-check-circle"></i>
                    </div>
                    <h4 class="modal-title fw-bold mb-2" id="globalSuccessModalLabel" style="color: #0f172a;">Success!</h4>
                    <p class="text-muted mb-4" th:text="${successMessage}">Action completed successfully.</p>
                    <button type="button" class="btn text-white w-100" data-bs-dismiss="modal" 
                            style="background-color: #0d233a; border-radius: 8px; font-weight: 600; padding: 10px;">
                        OK
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Error Modal -->
    <div th:if="${errorMessage}" class="modal fade" id="globalErrorModal" tabindex="-1" aria-labelledby="globalErrorModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow border-0" style="border-radius: 14px;">
                <div class="modal-body text-center p-4">
                    <div class="mb-3" style="color: #ef4444; font-size: 54px;">
                        <i class="bi bi-exclamation-circle"></i>
                    </div>
                    <h4 class="modal-title fw-bold mb-2" id="globalErrorModalLabel" style="color: #0f172a;">Error</h4>
                    <p class="text-muted mb-4" th:text="${errorMessage}">An error occurred.</p>
                    <button type="button" class="btn text-white w-100" data-bs-dismiss="modal" 
                            style="background-color: #ef4444; border-radius: 8px; font-weight: 600; padding: 10px;">
                        Close
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        document.addEventListener("DOMContentLoaded", function () {
            var successModalEl = document.getElementById('globalSuccessModal');
            if (successModalEl) {
                var mySuccessModal = new bootstrap.Modal(successModalEl);
                mySuccessModal.show();
            }
            var errorModalEl = document.getElementById('globalErrorModal');
            if (errorModalEl) {
                var myErrorModal = new bootstrap.Modal(errorModalEl);
                myErrorModal.show();
            }
        });
    </script>
</th:block>
</html>

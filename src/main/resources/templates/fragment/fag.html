<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hotels Management</title>
    <link th:href="@{/assets/css/bootstrap.css}" rel="stylesheet"/>
</head>

<nav th:fragment="navBar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">Hotels Management</a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/hotels}">Hotels</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto align-items-center gap-2">
                <th:block th:if="${session.loggedInUser == null}">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/login}">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-success btn-sm" th:href="@{/register}">Register</a>
                    </li>
                </th:block>
                <th:block th:if="${session.loggedInUser != null}">
                    <li class="nav-item">
                        <span class="nav-link text-warning">
                            Hi, <span th:text="${session.loggedInUser.fullName}"></span>
                        </span>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-outline-light btn-sm" th:href="@{/logout}">Logout</a>
                    </li>
                </th:block>
            </ul>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="bg-dark text-white text-center py-3" style="position: fixed; bottom: 0; width: 100%;">
    <small>&copy; 2026 Hotels Management</small>
</footer>

<th:block th:fragment="scripts">
    <script th:src="@{/assets/js/bootstrap.bundle.js}"></script>
</th:block>

</html>

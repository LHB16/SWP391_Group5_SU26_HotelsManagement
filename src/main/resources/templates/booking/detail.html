<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragment/frag :: head}"></head>

<body class="bh-page-layout">

    <!-- Thanh điều hướng -->
    <nav th:replace="~{fragment/frag :: navBar}"></nav>

    <main class="bh-main">
        <div class="bd-container">
            <!-- Nút quay lại -->
            <div class="bd-back-action">
                <a th:href="@{/booking/history}" class="bd-back-link">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-left"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                    Back to History
                </a>
            </div>

            <!-- Banner trên: Hình nền khách sạn, Tên phòng và Ngày -->
            <div class="bd-banner" th:style="'background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.5)), url(' + (${hotel.imageUrl != null and !#strings.isEmpty(hotel.imageUrl)} ? ${hotel.imageUrl} : '/assets/images/hotel-placeholder.jpg') + ');'">
                <div class="bd-banner-content">
                    <h1 class="bd-banner-room-name">
                        <span th:text="${room.type}">Room Type</span>
                    </h1>
                </div>
            </div>

            <!-- Nội dung dưới: Thông tin cơ bản -->
            <div class="bd-info-card">
                <div class="bd-hotel-row">
                    <!-- Ảnh khách sạn góc trái -->
                    <div class="bd-hotel-img-wrap">
                        <img th:if="${hotel.imageUrl != null and !#strings.isEmpty(hotel.imageUrl)}"
                             th:src="${hotel.imageUrl}"
                             th:alt="${hotel.name}"
                             class="bd-hotel-img"/>
                        <div th:unless="${hotel.imageUrl != null and !#strings.isEmpty(hotel.imageUrl)}"
                             class="bd-hotel-img-placeholder">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-hotel"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                        </div>
                    </div>

                    <!-- Tên khách sạn và thông tin checkin/checkout -->
                    <div class="bd-hotel-details">
                        <h2 class="bd-hotel-name" th:text="${hotel.name}">Hotel Name</h2>
                        <div class="bd-hotel-meta">
                            <span th:text="${#temporals.format(booking.checkInDate, 'dd/MM/yyyy')} + ' – ' + ${#temporals.format(booking.checkOutDate, 'dd/MM/yyyy')}">Apr 15 – Apr 17</span>
                            &nbsp;·&nbsp;
                            <span th:text="${room.type}">Samal</span>
                            &nbsp;·&nbsp;
                            <span th:if="${booking.status == 'EXPIRED' or (booking.status == 'CANCELLED' and booking.payment != null and booking.payment.status == 'EXPIRED')}">Expired</span>
                            <th:block th:unless="${booking.status == 'EXPIRED' or (booking.status == 'CANCELLED' and booking.payment != null and booking.payment.status == 'EXPIRED')}">
                                <span th:if="${booking.status == 'PENDING'}">
                                    <th:block th:if="${booking.payment != null and booking.payment.qrExpiresAt != null and booking.payment.qrExpiresAt.isBefore(now)}">Expired</th:block>
                                    <th:block th:unless="${booking.payment != null and booking.payment.qrExpiresAt != null and booking.payment.qrExpiresAt.isBefore(now)}">Pending</th:block>
                                </span>
                                <span th:unless="${booking.status == 'PENDING'}" th:text="${cancelable ? 'Free cancellation' : 'Non-refundable'}">Free cancellation</span>
                            </th:block>
                        </div>
                        
                        <!-- Dòng trạng thái hoặc Go to Payment -->
                        <div class="bd-status-action">
                            <!-- Nếu hết hạn thanh toán -->
                            <th:block th:if="${booking.status == 'EXPIRED' or (booking.status == 'CANCELLED' and booking.payment != null and booking.payment.status == 'EXPIRED') or (booking.status == 'PENDING' and booking.payment != null and booking.payment.qrExpiresAt != null and booking.payment.qrExpiresAt.isBefore(now))}">
                                <span class="bd-status-label bd-status-cancelled" style="background: #f1f5f9; color: #64748b; border: 1px solid #cbd5e1; font-size: 11px; padding: 2px 8px; border-radius: 8px; font-weight: 600;">Expired</span>
                            </th:block>
                            
                            <th:block th:unless="${booking.status == 'EXPIRED' or (booking.status == 'CANCELLED' and booking.payment != null and booking.payment.status == 'EXPIRED') or (booking.status == 'PENDING' and booking.payment != null and booking.payment.qrExpiresAt != null and booking.payment.qrExpiresAt.isBefore(now))}">
                                <th:block th:if="${booking.status == 'PENDING'}">
                                    <a th:href="@{/booking/qr-payment-status(bookingId=${booking.id},from='history')}" class="bd-status-btn bd-status-btn-pay">
                                        Go to payment
                                    </a>
                                </th:block>
                                <th:block th:unless="${booking.status == 'PENDING'}">
                                    <!-- Trạng thái thanh toán khác -->
                                    <span th:if="${booking.status == 'CONFIRMED'}" class="bd-status-label bd-status-confirmed">Confirmed</span>
                                    <a th:if="${booking.status == 'CONFIRMED' and cancelable}" th:href="@{/booking/cancel-policy(bookingId=${booking.id},action='cancel')}" class="btn btn-danger btn-sm ms-2" style="font-size: 11px; padding: 2px 8px; border-radius: 8px; font-weight: 600; text-decoration: none;">Cancel</a>
                                    <span th:if="${booking.status == 'DONE' or booking.status == 'COMPLETED'}" class="bd-status-label bd-status-done">Completed</span>
                                    <th:block th:if="${booking.status == 'DONE' or booking.status == 'COMPLETED'}">
                                        <a th:if="${!hasFeedback}" th:href="@{/booking/{id}/feedback(id=${booking.id})}" 
                                           class="bd-status-label ms-2" 
                                           style="background-color: var(--gold) !important; color: white !important; text-decoration: none; display: inline-block; vertical-align: middle;">
                                            Feedback
                                        </a>
                                        <span th:if="${hasFeedback}" class="bd-status-label bd-status-confirmed ms-2" style="vertical-align: middle;">
                                            Reviewed
                                        </span>
                                    </th:block>
                                    <span th:if="${booking.status == 'CANCELLED'}" class="bd-status-label bd-status-cancelled">Cancelled</span>
                                </th:block>
                            </th:block>
                        </div>
                    </div>

                    <!-- Nhóm bên phải: Giá tiền -->
                    <div class="bd-right-section">
                        <!-- Giá tiền -->
                        <div class="bd-price-box">
                            <span class="bd-price-val" th:text="${#numbers.formatInteger(booking.totalPrice, 3, 'COMMA') + ' VND'}">223,000 VND</span>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <!-- Footer -->
    <footer th:replace="~{fragment/frag :: footer}"></footer>

    <!-- Script xử lý đóng mở dropdown an toàn không phụ thuộc Bootstrap JS -->
    <script>
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.bd-dots-dropdown')) {
                document.querySelectorAll('.bd-dots-menu').forEach(function(menu) {
                    menu.classList.remove('show');
                });
            }
        });
    </script>

</body>
</html>

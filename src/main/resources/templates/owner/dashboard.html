<!-- src/main/resources/templates/owner/dashboard.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <th:block th:replace="~{fragment/frag :: head}"></th:block>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<!-- Header dùng chung -->
<nav th:replace="~{fragment/frag :: navBar}"></nav>

<!-- Main Content -->
<main class="flex-shrink-0">
    <div class="container py-4">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-lg-3 col-md-4 mb-4">
                <div class="owner-sidebar">
                    <div class="text-center mb-4">
                        <div class="avatar-icon mx-auto">
                            <span th:text="${#strings.substring(user.fullName, 0, 1).toUpperCase()}">O</span>
                        </div>
                        <h6 class="mt-2 fw-bold" th:text="${user.fullName}">Owner</h6>
                        <span class="role-badge">HOTEL OWNER</span>
                    </div>
                    <hr>
                    <nav class="nav flex-column">
                        <!-- Dashboard -->
                        <a class="nav-link active" href="/owner/dashboard">
                            <i data-lucide="layout-dashboard"></i>
                            <span>Dashboard</span>
                        </a>

                        <!-- My Hotels -->
                        <a class="nav-link" href="/owner/hotels">
                            <i data-lucide="hotel"></i>
                            <span>My Hotels</span>
                        </a>

                        <!-- Add Hotel -->
                        <a class="nav-link" href="/owner/hotels/new">
                            <i data-lucide="plus-circle"></i>
                            <span>Add New Hotel</span>
                        </a>

                        <!-- Manage Rooms -->
                        <a class="nav-link" href="#" onclick="alert('Please select a hotel first to manage rooms.');">
                            <i data-lucide="door-open"></i>
                            <span>Manage Rooms</span>
                        </a>

                        <!-- Bookings -->
                        <a class="nav-link" href="#">
                            <i data-lucide="calendar-check"></i>
                            <span>Bookings</span>
                        </a>

                        <!-- Revenue -->
                        <a class="nav-link" href="#">
                            <i data-lucide="dollar-sign"></i>
                            <span>Revenue</span>
                        </a>
                    </nav>
                </div>
            </div>

            <!-- Content -->
            <div class="col-lg-9 col-md-8">

                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                    <div>
                        <h1 class="fw-bold text-dark m-0">Owner Dashboard</h1>
                        <p class="text-muted m-0 mt-1">
                            Welcome back, <strong th:text="${user.fullName}"></strong>!
                        </p>
                    </div>
                    <div class="text-muted">
                        <i data-lucide="calendar" class="me-1"></i>
                        <span id="currentDateTime"></span>
                    </div>
                </div>

                <!-- Stats Cards -->
                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="owner-stat-card card-hotels">
                            <div class="stat-icon"><i data-lucide="hotel"></i></div>
                            <div class="stat-value" id="hotelCount">0</div>
                            <div class="stat-label">Total Hotels</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="owner-stat-card">
                            <div class="stat-icon"><i data-lucide="door-open"></i></div>
                            <div class="stat-value" id="roomCount">0</div>
                            <div class="stat-label">Total Rooms</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="owner-stat-card card-bookings">
                            <div class="stat-icon"><i data-lucide="calendar-check"></i></div>
                            <div class="stat-value" id="bookingCount">0</div>
                            <div class="stat-label">Total Bookings</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="owner-stat-card card-revenue">
                            <div class="stat-icon"><i data-lucide="dollar-sign"></i></div>
                            <div class="stat-value" id="revenueTotal">0 VND</div>
                            <div class="stat-label">Total Revenue</div>
                        </div>
                    </div>
                </div>

                <!-- Welcome Message -->
                <div class="alert alert-info d-flex align-items-center gap-3">
                    <i data-lucide="info" style="color: #4f46e5;"></i>
                    <div>
                        <strong>Welcome to Owner Dashboard!</strong>
                        <p class="mb-0 text-muted small">
                            Use the sidebar to manage your hotels, rooms, and track bookings.
                        </p>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<!-- Footer -->
<footer th:replace="~{fragment/frag :: footer}"></footer>

<!-- Scripts -->
<th:block th:replace="~{fragment/frag :: scripts}"></th:block>
<script th:src="@{/assets/js/owner-dashboard.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head th:replace="~{fragment/frag :: head}"></head>

<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragment/frag :: navBar}"></nav>

<!-- Hero Banner -->
<section class="bg-hero border-bottom-gold py-5">
    <div class="container-fluid px-4">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
            <div>
                <h1 class="text-white fw-bold mb-1">My Hotels</h1>
                <p class="text-gold-light mb-0">Manage your hotel properties</p>
            </div>
            <a href="/owner/hotels/new" class="btn btn-gold px-4 py-2">
                <i class="bi bi-plus-lg me-1"></i>
                Add New Hotel
            </a>
        </div>
    </div>
</section>

<!-- Main Content -->
<main class="flex-grow-1 py-4 bg-cream">
    <div class="container-fluid px-4">

        <!-- Flash messages -->
        <div th:if="${successMessage}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- Hotel Grid - Khi có hotel -->
        <div th:if="${hasHotels}" class="row g-4">
            <div th:each="hotel : ${hotels}" class="col-12 col-md-6 col-lg-4">
                <div class="card h-100 hotel-card">
                    <!-- Image -->
                    <div class="position-relative overflow-hidden" style="height:200px;">
                        <img th:if="${hotel.imageUrl != null and !hotel.imageUrl.isEmpty()}"
                             th:src="@{${hotel.imageUrl}}" th:alt="${hotel.name}"
                             class="w-100 h-100 object-fit-cover" />
                        <div th:if="${hotel.imageUrl == null or hotel.imageUrl.isEmpty()}"
                             class="w-100 h-100 d-flex align-items-center justify-content-center bg-light">
                            <i class="bi bi-image text-muted fs-3"></i>
                        </div>
                        <span class="badge badge-star position-absolute top-0 start-0 m-2">
                            <span th:text="${hotel.rating}">0</span> ★
                        </span>
                        <span class="badge position-absolute top-0 end-0 m-2"
                              th:classappend="${hotel.approvalStatus == 'APPROVED'} ? 'bg-success' :
                                             (${hotel.approvalStatus == 'REJECTED'} ? 'bg-danger' : 'bg-warning text-dark')"
                              th:text="${hotel.approvalStatus ?: 'PENDING'}">PENDING</span>
                    </div>

                    <!-- Card body -->
                    <div class="card-body">
                        <h5 class="card-title text-navy fw-bold mb-1" th:text="${hotel.name}">Hotel Name</h5>
                        <p class="text-muted small mb-0">
                            <i class="bi bi-geo-alt me-1"></i>
                            <span th:text="${hotel.address}">Address</span>
                        </p>
                        <! hiển thị city + district -->
                        <p class="text-muted small mt-1" th:with="fullCity = ${hotel.district != null and !hotel.district.isEmpty() ? hotel.city + ', ' + hotel.district : hotel.city}">
                            <i class="bi bi-building me-1"></i>
                            <span th:text="${fullCity}">City</span>
                        </p>
                        <p class="text-muted small mt-1">
                            <i class="bi bi-check-circle me-1"></i>
                            Active: <span th:text="${hotel.active} ? 'Yes' : 'No'">Yes</span>
                        </p>
                    </div>

                    <!-- Card footer -->
                    <div class="card-footer d-flex justify-content-between align-items-center">
                        <a th:href="@{/owner/hotels/{id}(id=${hotel.id})}"
                           class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-door-open me-1"></i>
                            Rooms
                        </a>
                        <div class="d-flex gap-2">
                            <a th:href="@{/owner/hotels/{id}/edit(id=${hotel.id})}"
                               class="btn btn-gold btn-sm">
                                <i class="bi bi-pencil me-1"></i>
                                Edit
                            </a>
                            <form th:action="@{/owner/hotels/{id}/delete(id=${hotel.id})}" method="post"
                                  onsubmit="return confirm('Delete this hotel?');">
                                <button type="submit" class="btn btn-danger btn-sm">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State - Khi chưa có khách sạn -->
        <div th:if="${!hasHotels}" class="empty-state-card text-center py-5">
            <i class="bi bi-building fs-1 text-gold mb-3 opacity-50 d-block"></i>
            <h5 class="text-navy fw-bold">You don't have any hotels yet</h5>
            <p class="text-muted">Register your first hotel to start managing</p>
            <a href="/owner/hotels/new" class="btn btn-gold mt-2">
                <i class="bi bi-plus-lg me-1"></i>
                Add New Hotel
            </a>
        </div>

    </div>
</main>

<footer th:replace="~{fragment/frag :: footer}"></footer>
<div th:replace="~{fragment/frag :: scripts}"></div>
</body>
</html>

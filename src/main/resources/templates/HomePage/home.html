<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/frag :: head}"></head>

<body class="d-flex flex-column" style="min-height: 100vh;">
    <nav th:replace="~{fragment/frag :: navBar}"></nav>

    <main class="container mt-5 flex-grow-1">
        <!-- Flash Messages -->
        <div class="row justify-content-center mb-4">
            <div class="col-md-8 col-lg-6">
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show d-flex align-items-center gap-2" role="alert">
                    <i data-lucide="check-circle" style="width: 20px; height: 20px; stroke-width: 1.5;"></i>
                    <span th:text="${successMessage}">Success</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center gap-2" role="alert">
                    <i data-lucide="alert-circle" style="width: 20px; height: 20px; stroke-width: 1.5;"></i>
                    <span th:text="${errorMessage}">Error</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            </div>
        </div>

        <div class="text-center py-5">
            <h1 class="display-4 fw-bold">Booking Hotels</h1>
            <p class="lead text-muted">Find and book your perfect hotel stay</p>

            <th:block th:if="${session.loggedInUser == null}">
                <a th:href="@{/register}" class="btn btn-success btn-lg me-2">Get Started</a>
                <a th:href="@{/login}" class="btn btn-outline-primary btn-lg">Login</a>
            </th:block>

            <th:block th:if="${session.loggedInUser != null}">
                <a th:href="@{/hotels}" class="btn btn-primary btn-lg">Browse Hotels</a>
            </th:block>
        </div>
    </main>

    <footer th:replace="~{fragment/frag :: footer}"></footer>
    <div th:replace="~{fragment/frag :: scripts}"></div>
</body>

</html>

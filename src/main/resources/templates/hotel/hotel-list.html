<!DOCTYPE html>
<!--
    hotel/hotel-list.html
    Trang danh sách khách sạn – Layout Bootstrap 12 cột:
    col-lg-3 (Filter) | col-lg-9 (Hotel Cards 3 cột)
    Dataset: active, address, imageUrl, name, price, rating
-->
<html xmlns:th="http://www.thymeleaf.org">

<!-- ==================== HEAD (từ fragment) ==================== -->

<head th:replace="~{fragment/fag :: head}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- CSS riêng cho trang Hotels (bổ sung thêm Bootstrap) -->
    <link rel="stylesheet" th:href="@{/assets/css/hotel-list.css}" />

    <!-- ==================== NAVBAR (từ fragment) ==================== -->
    <nav th:replace="~{fragment/fag :: navBar}"></nav>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="flex-grow-1 py-4">
        <div class="container-fluid px-4">

            <!-- Tiêu đề trang + nút Add Hotel -->
            <div class="mb-4 d-flex align-items-center justify-content-between flex-wrap gap-2">
                <div>
                    <h1 class="h3 fw-bold text-primary mb-1">Hotel List</h1>
                    <p class="text-muted mb-0">
                        Found <strong th:text="${totalResults}">0</strong> hotel(s)
                    </p>
                </div>
                <!-- Nút thêm khách sạn mới -->
                <a href="/hotels/new"
                   class="btn btn-primary d-inline-flex align-items-center gap-2 fw-semibold">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15"
                         viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Add Hotel
                </a>
            </div>

            <!-- Flash messages sau khi thêm thành công / lỗi -->
            <div th:if="${successMessage}"
                 class="alert alert-success d-flex align-items-center gap-2 mb-3" role="alert">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
                <span th:text="${successMessage}">Success</span>
            </div>
            <div th:if="${errorMessage}"
                 class="alert alert-danger d-flex align-items-center gap-2 mb-3" role="alert">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span th:text="${errorMessage}">Error</span>
            </div>


            <!-- ROW chính: 3 (Filter) + 9 (Cards) -->
            <div class="row g-4">

                <!-- ===== CỘT FILTER (col-lg-3) ===== -->
                <div class="col-12 col-lg-3">
                    <div class="card border-0 shadow-sm position-sticky" style="top: 80px;">
                        <div class="card-body">
                            <h5 class="card-title fw-bold text-primary border-bottom pb-2 mb-3">
                                <!-- Icon phễu lọc (Lucide) -->
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="me-1" style="vertical-align:-2px;">
                                    <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3" />
                                </svg>
                                Filter by:
                            </h5>

                            <!-- Form gửi GET /hotels -->
                            <form th:action="@{/hotels}" method="get" id="filterForm">
                                <input type="hidden" name="checkin" id="filterCheckin" th:value="${checkin}" />
                                <input type="hidden" name="checkout" id="filterCheckout" th:value="${checkout}" />

                                <!-- Lọc theo số sao (Multi-select Buttons) -->
                                <div class="mb-3">
                                    <label class="form-label fw-semibold text-uppercase small">Star Rating</label>
                                    <div class="d-flex flex-wrap gap-1">
                                        <!-- Nút "All" -->
                                        <button type="button" class="btn btn-sm hotel-star-btn"
                                            th:classappend="${ratings.isEmpty()} ? ' active' : ''" data-value="0">
                                            All
                                        </button>
                                        <!-- 5 nút 1★ đến 5★ -->
                                        <button type="button" th:each="star : ${#numbers.sequence(1, 5)}"
                                            class="btn btn-sm hotel-star-btn"
                                            th:classappend="${#lists.contains(ratings, star)} ? ' active' : ''"
                                            th:data-value="${star}" th:text="${star + ' ★'}">
                                            1 ★
                                        </button>
                                    </div>
                                    <!-- Container chứa hidden inputs cho ratings (JS quản lý) -->
                                    <div id="ratingsContainer">
                                        <input th:each="r : ${ratings}" type="hidden" name="ratings" th:value="${r}" />
                                    </div>
                                </div>

                                <!-- Lọc theo khoảng giá (Dual Range Slider) -->
                                <div class="mb-4">
                                    <label class="form-label fw-semibold text-uppercase small">Price Range (per night)
                                    </label>
                                    <!-- Hiển thị min-max -->
                                    <div class="d-flex justify-content-between mb-2">
                                        <span class="badge bg-primary bg-opacity-10 text-primary" id="minPriceDisplay">0
                                            VND</span>
                                        <span class="badge bg-primary bg-opacity-10 text-primary"
                                            id="maxPriceDisplay">50,000,000 VND</span>
                                    </div>
                                    <!-- Dual range slider -->
                                    <div class="hotel-dual-range-wrap">
                                        <div class="hotel-dual-range-track"></div>
                                        <div class="hotel-dual-range-highlight" id="rangeHighlight"></div>
                                        <input type="range" id="minPriceSlider" class="hotel-dual-range-input" min="0"
                                            max="50000000" step="50000" th:value="${minPrice}" />
                                        <input type="range" id="maxPriceSlider" class="hotel-dual-range-input" min="0"
                                            max="50000000" step="50000" th:value="${maxPrice}" />
                                    </div>
                                    <div class="d-flex justify-content-between mt-1">
                                        <small class="text-muted">0 VND</small>
                                        <small class="text-muted">50,000,000 VND</small>
                                    </div>
                                    <!-- Hidden inputs -->
                                    <input type="hidden" id="minPriceInput" name="minPrice" th:value="${minPrice}" />
                                    <input type="hidden" id="maxPriceInput" name="maxPrice" th:value="${maxPrice}" />
                                </div>

                                <!-- Nút hành động -->
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round" class="me-1">
                                            <circle cx="11" cy="11" r="8" />
                                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                                        </svg>
                                        Search
                                    </button>
                                    <a th:href="@{/hotels}" class="btn btn-outline-secondary">
                                        Clear Filters
                                    </a>
                                </div>

                            </form>
                        </div>
                    </div>
                </div>
                <!-- ===== KẾT THÚC CỘT FILTER ===== -->


                <!-- ===== CỘT DANH SÁCH KHÁCH SẠN (col-lg-9) ===== -->
                <div class="col-12 col-lg-9">

                    <!-- Thanh chọn ngày Check-in / Check-out -->
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-body p-3">
                            <div class="row g-3 align-items-center">
                                <div class="col-12 col-md-5">
                                    <div class="d-flex align-items-center gap-2">
                                        <div class="text-primary bg-primary bg-opacity-10 p-2 rounded">
                                            <!-- Calendar Icon -->
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                        </div>
                                        <div class="flex-grow-1">
                                            <label for="listCheckinDate" class="form-label small fw-semibold text-uppercase text-muted mb-0" style="font-size: 0.75rem;">Check-in Date</label>
                                            <input type="date" id="listCheckinDate" class="form-control border-0 fw-semibold p-0 shadow-none" style="font-size: 0.95rem; background: transparent;" th:value="${checkin}">
                                        </div>
                                    </div>
                                </div>
                                <div class="col-12 col-md-5">
                                    <div class="d-flex align-items-center gap-2">
                                        <div class="text-primary bg-primary bg-opacity-10 p-2 rounded">
                                            <!-- Calendar Icon -->
                                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                        </div>
                                        <div class="flex-grow-1">
                                            <label for="listCheckoutDate" class="form-label small fw-semibold text-uppercase text-muted mb-0" style="font-size: 0.75rem;">Check-out Date</label>
                                            <input type="date" id="listCheckoutDate" class="form-control border-0 fw-semibold p-0 shadow-none" style="font-size: 0.95rem; background: transparent;" th:value="${checkout}">
                                        </div>
                                    </div>
                                </div>
                                <div class="col-12 col-md-2 d-grid">
                                    <button type="button" id="btnSearchWithDates" class="btn btn-primary fw-semibold text-nowrap">
                                        Apply Dates
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Trường hợp KHÔNG có khách sạn -->
                    <div th:if="${hotels == null or hotels.isEmpty()}"
                        class="text-center py-5 bg-white rounded-3 border border-dashed">
                        <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none"
                            stroke="#dee2e6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                            <polyline points="9 22 9 12 15 12 15 22" />
                        </svg>
                        <h5 class="mt-3 text-primary">No Hotels Found</h5>
                        <p class="text-muted">Try adjusting your filters or clear all filters to see all hotels.</p>
                    </div>

                    <!-- Trường hợp CÓ khách sạn – Grid 3 cột -->
                    <div th:if="${hotels != null and !hotels.isEmpty()}"
                        class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">

                        <!-- Lặp qua từng khách sạn -->
                        <div class="col" th:each="hotel : ${hotels}">
                            <div class="card h-100 border-0 shadow-sm hotel-card">

                                <!-- Ảnh khách sạn (dùng imageUrl từ database) -->
                                <div class="position-relative overflow-hidden" style="height: 200px;">
                                    <!-- Hiển thị ảnh từ imageUrl -->
                                    <img th:if="${hotel.imageUrl != null and !hotel.imageUrl.isEmpty()}"
                                        th:src="@{${hotel.imageUrl}}" th:alt="${hotel.name}"
                                        class="card-img-top w-100 h-100 object-fit-cover hotel-card-img" />
                                    <!-- Placeholder khi không có ảnh -->
                                    <div th:if="${hotel.imageUrl == null or hotel.imageUrl.isEmpty()}"
                                        class="w-100 h-100 d-flex align-items-center justify-content-center bg-secondary bg-opacity-10">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"
                                            viewBox="0 0 24 24" fill="none" stroke="#adb5bd" stroke-width="1.5"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                            <circle cx="8.5" cy="8.5" r="1.5" />
                                            <polyline points="21 15 16 10 5 21" />
                                        </svg>
                                    </div>

                                    <!-- Badge số sao (rating) - màu vàng gold -->
                                    <span
                                        class="badge position-absolute top-0 start-0 m-2"
                                        style="background: #ffff00; color:#1a1a1a; font-size:.78rem; letter-spacing:.04em;">
                                        <span th:text="${hotel.rating}">5</span> ★
                                    </span>

                                    <!-- Badge trạng thái hoạt động (active) -->
                                    <span class="badge position-absolute top-0 end-0 m-2"
                                        th:classappend="${hotel.active} ? 'bg-success' : 'bg-danger'"
                                        th:text="${hotel.active} ? 'Activate' : 'Deactivate'">
                                        Activate
                                    </span>
                                </div>

                                <!-- Nội dung card -->
                                <div class="card-body d-flex flex-column">
                                    <!-- Tên khách sạn (name) -->
                                    <h5 class="card-title fw-bold mb-1" th:text="${hotel.name}">Hotel Name</h5>

                                    <!-- Địa chỉ (address) -->
                                    <p class="text-muted small mb-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round" class="me-1"
                                            style="vertical-align: -1px;">
                                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                                            <circle cx="12" cy="10" r="3" />
                                        </svg>
                                        <span th:text="${hotel.address}">Hotel Address</span>
                                    </p>

                                    <!-- Spacer đẩy footer xuống dưới cùng -->
                                    <div class="mt-auto"></div>
                                </div>

                                <!-- Footer card: giá (price) + nút xem phòng -->
                                <div
                                    class="card-footer bg-light border-top d-flex justify-content-between align-items-center">
                                    <div>
                                        <!-- Giá/đêm (price) -->
                                        <span class="fw-bold text-primary"
                                            th:text="${#numbers.formatInteger(hotel.price, 0, 'COMMA')}">0</span>
                                        <small class="text-muted fw-bold">VND</small>
                                    </div>
                                    <!-- Nút xem phòng -->
                                    <a th:href="@{/hotels/{id}/rooms(id=${hotel.id}, checkin=${checkin}, checkout=${checkout})}"
                                       th:data-base-url="@{/hotels/{id}/rooms(id=${hotel.id})}"
                                       class="btn btn-sm btn-primary btn-view-rooms">
                                        View Rooms
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                            stroke-linecap="round" stroke-linejoin="round" class="ms-1">
                                            <line x1="5" y1="12" x2="19" y2="12" />
                                            <polyline points="12 5 19 12 12 19" />
                                        </svg>
                                    </a>
                                </div>

                            </div>
                        </div>
                        <!-- Kết thúc vòng lặp -->

                    </div>

                </div>
                <!-- ===== KẾT THÚC CỘT CARDS ===== -->

            </div>
        </div>
    </main>

    <!-- ==================== FOOTER (từ fragment) ==================== -->
    <footer th:replace="~{fragment/fag :: footer}"></footer>

    <!-- ==================== SCRIPTS (từ fragment) ==================== -->
    <div th:replace="~{fragment/fag :: scripts}"></div>

    <!-- JS riêng cho trang Hotels -->
    <script th:src="@{/assets/js/hotel-list.js}"></script>

</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/frag :: head}"></head>

<body class="d-flex flex-column min-vh-100">
<link rel="stylesheet" th:href="@{/assets/css/hotel-list.css}" />

<nav th:replace="~{fragment/frag :: navBar}"></nav>

<!-- Hero Banner -->
<section class="bg-hero border-bottom-gold py-5">
    <div class="container-fluid px-4">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
            <div>
                <h1 class="text-white fw-bold mb-1"
                    style="font-family:'Playfair Display',serif; font-size:clamp(1.6rem,3vw,2.1rem);">
                    Hotel List
                </h1>
                <p class="text-gold-light mb-0">
                    Found <strong th:text="${totalResults}">0</strong> hotel(s) available
                </p>
            </div>
            <a href="/hotels/new" class="btn btn-gold px-4 py-2">
                <i class="bi bi-plus-lg me-1"></i>
                Add Hotel
            </a>
        </div>
    </div>
</section>

<!-- Main Content -->
<main class="flex-grow-1 py-4 bg-cream">
    <div class="container-fluid px-4">

        <!-- Flash messages -->
        <div th:if="${successMessage}" class="alert alert-success d-flex align-items-center gap-2 mb-3" role="alert">
            <i class="bi bi-check-circle-fill"></i>
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center gap-2 mb-3" role="alert">
            <i class="bi bi-exclamation-triangle-fill"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <div class="row g-4">

            <!-- ===== FILTER SIDEBAR ===== -->
            <div class="col-12 col-lg-3">
                <div class="card filter-sidebar-card">
                    <div class="card-header text-gold">
                        <i class="bi bi-funnel me-1"></i>
                        Filter by:
                    </div>
                    <div class="card-body">
                        <form th:action="@{/hotels}" method="get" id="filterForm">

                            <!-- Check-in / Check-out -->
                            <div class="mb-3">
                                <label class="filter-section-label" for="filterCheckin">Check-in Date</label>
                                <input type="date" name="checkin" id="filterCheckin"
                                       class="filter-input" th:value="${checkin}" />
                            </div>
                            <div class="mb-3">
                                <label class="filter-section-label" for="filterCheckout">Check-out Date</label>
                                <input type="date" name="checkout" id="filterCheckout"
                                       class="filter-input" th:value="${checkout}" />
                            </div>

                            <hr class="border-gold-faint my-3">

                            <!-- Star Rating -->
                            <div class="mb-3">
                                <div class="filter-section-label">Star Rating</div>
                                <div class="d-flex flex-wrap gap-1">
                                    <th:block th:each="star : ${#numbers.sequence(1, 5)}">
                                        <input type="checkbox" class="btn-check" name="ratings"
                                               th:id="${'star-' + star}" th:value="${star}"
                                               th:checked="${#lists.contains(ratings, star)}" />
                                        <label class="hl-star-label" th:for="${'star-' + star}"
                                               th:text="${star + ' ★'}">1 ★</label>
                                    </th:block>
                                </div>
                            </div>

                            <hr class="border-gold-faint my-3">

                            <!-- Price Range -->
                            <div class="mb-4">
                                <div class="filter-section-label">Price Range / Night</div>
                                <div class="row g-2">
                                    <div class="col-6">
                                        <label class="form-label small text-muted mb-1" for="minPriceInput">From (VND)</label>
                                        <input type="number" id="minPriceInput" name="minPrice"
                                               class="filter-input" min="0" max="50000000" step="50000"
                                               th:value="${minPrice}" placeholder="0" />
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label small text-muted mb-1" for="maxPriceInput">To (VND)</label>
                                        <input type="number" id="maxPriceInput" name="maxPrice"
                                               class="filter-input" min="0" max="50000000" step="50000"
                                               th:value="${maxPrice}" placeholder="50M" />
                                    </div>
                                </div>
                            </div>

                            <!-- Action buttons -->
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-gold">
                                    <i class="bi bi-search me-1"></i>
                                    Search
                                </button>
                                <a th:href="@{/hotels}" class="btn btn-outline-secondary">Clear Filters</a>
                            </div>

                        </form>
                    </div>
                </div>
            </div>

            <!-- ===== HOTEL GRID ===== -->
            <div class="col-12 col-lg-9">

                <!-- Empty state -->
                <div th:if="${hotels == null or hotels.isEmpty()}" class="empty-state-card">
                    <i class="bi bi-building fs-1 text-gold mb-3 opacity-50 d-block"></i>
                    <h5 class="text-navy fw-bold">No Hotels Found</h5>
                    <p class="text-muted">Try adjusting your filters or clear all filters to see all hotels.</p>
                </div>

                <!-- Hotel cards grid -->
                <div th:if="${hotels != null and !hotels.isEmpty()}"
                     class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
                    <div class="col" th:each="hotel : ${hotels}">
                        <div class="card h-100 hotel-card">

                            <!-- Image -->
                            <div class="position-relative overflow-hidden" style="height:210px;">
                                <img th:if="${hotel.imageUrl != null and !hotel.imageUrl.isEmpty()}"
                                    th:src="@{${hotel.imageUrl}}" th:alt="${hotel.name}"
                                    class="w-100 h-100 object-fit-cover hotel-card img-fluid" />
                                <div th:if="${hotel.imageUrl == null or hotel.imageUrl.isEmpty()}"
                                    class="w-100 h-100 d-flex align-items-center justify-content-center bg-light">
                                    <i class="bi bi-image text-muted fs-3"></i>
                                </div>
                                <!-- Badges -->
                                <span class="badge badge-star position-absolute top-0 start-0 m-2">
                                    <span th:text="${hotel.rating}">5</span> ★
                                </span>
                                <span class="badge position-absolute top-0 end-0 m-2"
                                    th:classappend="${hotel.active} ? 'bg-success' : 'bg-danger'"
                                    th:text="${hotel.active} ? 'Active' : 'Inactive'">Active</span>
                            </div>

                            <!-- Card body -->
                            <div class="card-body">
                                <h5 class="card-title text-navy fw-bold mb-1" th:text="${hotel.name}">Hotel Name</h5>
                                <p class="text-muted small mb-0">
                                    <i class="bi bi-geo-alt me-1"></i>
                                    <span th:text="${hotel.address}">Address</span>
                                </p>
                            </div>

                            <!-- Card footer -->
                            <div class="card-footer d-flex justify-content-between align-items-center">
                                <div>
                                    <span class="fw-bold text-gold-dark fs-6"
                                        th:text="${#numbers.formatInteger(hotel.price, 0, 'COMMA')}">0</span>
                                    <small class="text-muted"> VND/night</small>
                                </div>
                                <a th:href="@{/hotels/{id}/rooms(id=${hotel.id}, checkin=${checkin}, checkout=${checkout})}"
                                   class="btn btn-gold btn-sm">
                                    View Rooms
                                    <i class="bi bi-arrow-right ms-1"></i>
                                </a>
                            </div>

                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>
</main>

<footer th:replace="~{fragment/frag :: footer}"></footer>
<div th:replace="~{fragment/frag :: scripts}"></div>
</body>
</html>

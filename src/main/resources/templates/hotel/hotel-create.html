<!DOCTYPE html>
<!--
    hotel/hotel-create.html
    Form thêm mới khách sạn – hỗ trợ upload ảnh, preview real-time
    Fields: name, address, rating (1-5 sao), price, active, imageFile
-->
<html xmlns:th="http://www.thymeleaf.org">

<!-- ==================== HEAD (từ fragment) ==================== -->
<head th:replace="~{fragment/fag :: head}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- CSS riêng cho form tạo khách sạn -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --navy:      #0a1628;
            --navy-lt:   #142038;
            --gold:      #c9a96e;
            --gold-dk:   #a8824e;
            --gold-lt:   #e8d5a3;
            --cream:     #faf8f4;
            --radius:    14px;
            --shadow:    0 8px 32px rgba(10,22,40,.12);
            --transition: .3s cubic-bezier(.4,0,.2,1);
        }

        body { font-family: 'Inter', sans-serif; background: var(--cream); }

        /* ── Page header ── */
        .create-hero {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-lt) 70%, #1e3a5f 100%);
            padding: 40px 0 32px;
        }
        .create-hero h1 {
            font-family: 'Playfair Display', serif;
            color: #fff;
            font-size: clamp(1.5rem,3vw,2.1rem);
            margin-bottom: 6px;
        }
        .create-hero p { color: var(--gold-lt); font-size: .9rem; opacity: .8; margin: 0; }

        /* Breadcrumb */
        .bc-link { color: var(--gold-lt); text-decoration: none; font-size: .83rem; opacity: .8; }
        .bc-link:hover { opacity: 1; color: var(--gold); }
        .bc-sep { color: rgba(201,169,110,.4); margin: 0 6px; }
        .bc-active { color: var(--gold); font-size: .83rem; font-weight: 500; }

        /* ── Form card ── */
        .form-card {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid #e9ecef;
            overflow: hidden;
            margin-bottom: 40px;
        }
        .form-card-header {
            background: linear-gradient(135deg, var(--navy), var(--navy-lt));
            padding: 18px 24px;
            display: flex; align-items: center; gap: 10px;
        }
        .form-card-header h5 {
            font-family: 'Playfair Display', serif;
            color: #fff; font-size: 1rem; margin: 0;
        }
        .form-card-body { padding: 28px 24px; }

        /* ── Form labels ── */
        .form-label-custom {
            font-size: .75rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: .07em;
            color: #6b7280; margin-bottom: 6px; display: block;
        }

        /* ── Form controls ── */
        .fc {
            display: block; width: 100%; padding: 10px 14px;
            border: 1.5px solid #e5e7eb; border-radius: 10px;
            font-size: .9rem; color: #1a1a2e;
            background: #fafafa; transition: var(--transition);
            font-family: 'Inter', sans-serif;
        }
        .fc:focus {
            outline: none;
            border-color: var(--gold);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(201,169,110,.15);
        }

        /* ── Star rating picker ── */
        .star-picker { display: flex; gap: 8px; flex-wrap: wrap; }
        .star-btn {
            width: 44px; height: 44px;
            border-radius: 10px;
            border: 1.5px solid #e5e7eb;
            background: #fafafa;
            font-size: .85rem; font-weight: 700; cursor: pointer;
            transition: var(--transition); color: #6b7280;
            display: flex; align-items: center; justify-content: center; gap: 2px;
        }
        .star-btn:hover { border-color: var(--gold); color: var(--gold-dk); background: rgba(201,169,110,.08); }
        .star-btn.selected {
            border-color: var(--gold); background: var(--gold);
            color: #fff; box-shadow: 0 4px 12px rgba(168,130,78,.35);
        }

        /* ── Image upload zone ── */
        .img-upload-zone {
            border: 2px dashed #d1d5db;
            border-radius: var(--radius);
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: #fafafa;
            position: relative;
        }
        .img-upload-zone:hover, .img-upload-zone.dragover {
            border-color: var(--gold);
            background: rgba(201,169,110,.05);
        }
        .img-upload-zone input[type="file"] {
            position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
        }
        .img-upload-icon { color: #9ca3af; margin-bottom: 10px; }
        .img-upload-text { font-size: .85rem; color: #6b7280; }
        .img-upload-hint { font-size: .75rem; color: #9ca3af; margin-top: 4px; }

        /* ── Preview ảnh ── */
        #imagePreviewWrap {
            margin-top: 14px; display: none;
            border-radius: 10px; overflow: hidden;
            border: 1.5px solid var(--gold-lt);
        }
        #imagePreview {
            width: 100%; max-height: 220px;
            object-fit: cover; display: block;
        }
        .img-preview-remove {
            display: flex; align-items: center; justify-content: center; gap: 5px;
            width: 100%; padding: 7px;
            background: #fff; border: none;
            font-size: .8rem; color: #ef4444;
            cursor: pointer; font-weight: 600;
            transition: background .2s;
        }
        .img-preview-remove:hover { background: #fef2f2; }

        /* ── Active toggle ── */
        .toggle-wrap {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 14px;
            border: 1.5px solid #e5e7eb; border-radius: 10px;
            background: #fafafa; cursor: pointer;
            transition: var(--transition);
        }
        .toggle-wrap:hover { border-color: var(--gold); background: rgba(201,169,110,.05); }
        .toggle-switch {
            width: 42px; height: 22px; border-radius: 99px;
            background: #e5e7eb; position: relative;
            transition: background var(--transition); flex-shrink: 0;
        }
        .toggle-switch::after {
            content: ''; position: absolute;
            width: 16px; height: 16px; border-radius: 50%;
            background: #fff; top: 3px; left: 3px;
            transition: transform var(--transition);
            box-shadow: 0 1px 3px rgba(0,0,0,.2);
        }
        .toggle-wrap.on .toggle-switch { background: #22c55e; }
        .toggle-wrap.on .toggle-switch::after { transform: translateX(20px); }
        .toggle-label { font-size: .88rem; color: #374151; font-weight: 500; }
        .toggle-status { font-size: .78rem; font-weight: 700; }
        .toggle-wrap.on .toggle-status { color: #16a34a; }
        .toggle-wrap:not(.on) .toggle-status { color: #6b7280; }

        /* ── Buttons ── */
        .btn-submit {
            background: linear-gradient(135deg, var(--gold-dk), var(--gold));
            color: #fff; border: none; border-radius: 10px;
            padding: 12px 28px; font-weight: 700; font-size: .9rem;
            cursor: pointer; display: inline-flex; align-items: center; gap: 7px;
            transition: var(--transition); letter-spacing: .03em;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, var(--navy), var(--navy-lt));
            color: var(--gold-lt);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(168,130,78,.35);
        }
        .btn-cancel {
            background: transparent; color: #6b7280;
            border: 1.5px solid #e5e7eb; border-radius: 10px;
            padding: 11px 24px; font-size: .88rem; font-weight: 500;
            cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px;
            transition: var(--transition);
        }
        .btn-cancel:hover { border-color: #9ca3af; color: #374151; background: #f9fafb; text-decoration: none; }

        /* ── Alert messages ── */
        .alert-success {
            background: #f0fdf4; border: 1px solid #bbf7d0;
            border-radius: 10px; padding: 12px 16px;
            color: #16a34a; font-size: .88rem; font-weight: 500;
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 20px;
        }
        .alert-error {
            background: #fef2f2; border: 1px solid #fecaca;
            border-radius: 10px; padding: 12px 16px;
            color: #dc2626; font-size: .88rem; font-weight: 500;
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 20px;
        }

        /* Divider */
        .form-divider {
            height: 1px; background: #f3f4f6; margin: 24px 0;
        }
    </style>

    <!-- ==================== NAVBAR ==================== -->
    <nav th:replace="~{fragment/fag :: navBar}"></nav>

    <!-- ==================== HERO ==================== -->
    <section class="create-hero">
        <div class="container">
            <!-- Breadcrumb -->
            <div class="mb-3">
                <a href="/hotels" class="bc-link">Hotels</a>
                <span class="bc-sep">/</span>
                <span class="bc-active">Add New Hotel</span>
            </div>
            <h1>Add New Hotel</h1>
            <p>Fill in the details below to register a new hotel into the system.</p>
        </div>
    </section>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main class="flex-grow-1 py-4" style="background: var(--cream);">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-8">

                    <!-- Alert messages từ redirect -->
                    <div th:if="${successMessage}" class="alert-success">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        <span th:text="${successMessage}">Success</span>
                    </div>
                    <div th:if="${errorMessage}" class="alert-error">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                             viewBox="0 0 24 24" fill="none" stroke="currentColor"
                             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        <span th:text="${errorMessage}">Error</span>
                    </div>

                    <!-- Form card -->
                    <div class="form-card">
                        <div class="form-card-header">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                 viewBox="0 0 24 24" fill="none" stroke="#c9a96e"
                                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                                <polyline points="9 22 9 12 15 12 15 22"/>
                            </svg>
                            <h5>Hotel Information</h5>
                        </div>

                        <div class="form-card-body">
                            <!-- Form gửi POST với enctype multipart để upload ảnh -->
                            <form action="/hotels/new" method="post"
                                  enctype="multipart/form-data" id="hotelCreateForm">

                                <!-- ── Tên khách sạn ── -->
                                <div class="mb-4">
                                    <label class="form-label-custom">
                                        Hotel Name <span style="color:#ef4444;">*</span>
                                    </label>
                                    <input type="text" name="name" id="hotelName"
                                           class="fc" placeholder="e.g. Lion Hotel 6"
                                           required maxlength="200" />
                                </div>

                                <!-- ── Địa chỉ ── -->
                                <div class="mb-4">
                                    <label class="form-label-custom">
                                        Address <span style="color:#ef4444;">*</span>
                                    </label>
                                    <input type="text" name="address" id="hotelAddress"
                                           class="fc" placeholder="e.g. 123 Nguyen Van Cu, Can Tho"
                                           required maxlength="500" />
                                </div>

                                <div class="row g-4 mb-4">
                                    <!-- ── Số sao ── -->
                                    <div class="col-12 col-sm-6">
                                        <label class="form-label-custom">
                                            Star Rating <span style="color:#ef4444;">*</span>
                                        </label>
                                        <!-- Hidden input lưu giá trị thực -->
                                        <input type="hidden" name="rating" id="ratingInput" value="3" />
                                        <div class="star-picker" id="starPicker">
                                            <button type="button" class="star-btn" data-val="1">1 ★</button>
                                            <button type="button" class="star-btn" data-val="2">2 ★</button>
                                            <button type="button" class="star-btn selected" data-val="3">3 ★</button>
                                            <button type="button" class="star-btn" data-val="4">4 ★</button>
                                            <button type="button" class="star-btn" data-val="5">5 ★</button>
                                        </div>
                                    </div>

                                    <!-- ── Giá/đêm ── -->
                                    <div class="col-12 col-sm-6">
                                        <label class="form-label-custom">
                                            Price / Night (VND) <span style="color:#ef4444;">*</span>
                                        </label>
                                        <input type="number" name="price" id="hotelPrice"
                                               class="fc" placeholder="e.g. 500000"
                                               min="0" step="1" required />
                                    </div>
                                </div>

                                <!-- ── Trạng thái hoạt động ── -->
                                <div class="mb-4">
                                    <label class="form-label-custom">Status</label>
                                    <!-- Hidden input thực tế gửi lên server -->
                                    <input type="hidden" name="active" id="activeInput" value="true" />
                                    <div class="toggle-wrap on" id="activeToggle">
                                        <div class="toggle-switch"></div>
                                        <div>
                                            <div class="toggle-label">Hotel Active</div>
                                            <div class="toggle-status" id="activeStatus">Active</div>
                                        </div>
                                    </div>
                                </div>

                                <div class="form-divider"></div>

                                <!-- ── Upload ảnh ── -->
                                <div class="mb-4">
                                    <label class="form-label-custom">Hotel Image</label>
                                    <div class="img-upload-zone" id="uploadZone">
                                        <!-- File input thực tế -->
                                        <input type="file" name="imageFile" id="imageFile"
                                               accept="image/jpeg,image/png,image/webp,image/jpg" />
                                        <div class="img-upload-icon">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40"
                                                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                 stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                                <polyline points="21 15 16 10 5 21"/>
                                            </svg>
                                        </div>
                                        <div class="img-upload-text">
                                            <strong>Click to upload</strong> or drag & drop
                                        </div>
                                        <div class="img-upload-hint">JPG, PNG, WEBP · Max 10MB</div>
                                    </div>

                                    <!-- Preview ảnh đã chọn -->
                                    <div id="imagePreviewWrap">
                                        <img id="imagePreview" src="#" alt="Preview" />
                                        <button type="button" class="img-preview-remove" id="removeImage">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13"
                                                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                                <polyline points="3 6 5 6 21 6"/>
                                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                                            </svg>
                                            Remove Image
                                        </button>
                                    </div>
                                </div>

                                <div class="form-divider"></div>

                                <!-- ── Buttons ── -->
                                <div class="d-flex gap-3 justify-content-end flex-wrap">
                                    <a href="/hotels" class="btn-cancel">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                                             viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                            <line x1="19" y1="12" x2="5" y2="12"/>
                                            <polyline points="12 19 5 12 12 5"/>
                                        </svg>
                                        Cancel
                                    </a>
                                    <button type="submit" class="btn-submit" id="submitBtn">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                                             viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                                            <polyline points="17 21 17 13 7 13 7 21"/>
                                            <polyline points="7 3 7 8 15 8"/>
                                        </svg>
                                        Save Hotel
                                    </button>
                                </div>

                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- ==================== FOOTER ==================== -->
    <footer th:replace="~{fragment/fag :: footer}"></footer>

    <!-- ==================== SCRIPTS ==================== -->
    <div th:replace="~{fragment/fag :: scripts}"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {

            // ── Star Rating Picker ──────────────────────────
            const starBtns = document.querySelectorAll('.star-btn');
            const ratingInput = document.getElementById('ratingInput');

            starBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    starBtns.forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    ratingInput.value = this.dataset.val;
                });
            });

            // ── Active Toggle ──────────────────────────────
            const activeToggle = document.getElementById('activeToggle');
            const activeInput  = document.getElementById('activeInput');
            const activeStatus = document.getElementById('activeStatus');

            activeToggle.addEventListener('click', function() {
                const isOn = this.classList.toggle('on');
                activeInput.value  = isOn ? 'true' : 'false';
                activeStatus.textContent = isOn ? 'Active' : 'Inactive';
            });

            // ── Image Upload Preview ───────────────────────
            const imageFile       = document.getElementById('imageFile');
            const previewWrap     = document.getElementById('imagePreviewWrap');
            const previewImg      = document.getElementById('imagePreview');
            const removeBtn       = document.getElementById('removeImage');
            const uploadZone      = document.getElementById('uploadZone');

            imageFile.addEventListener('change', function() {
                const file = this.files[0];
                if (!file) return;

                // Kiểm tra dung lượng tối đa 10MB
                if (file.size > 10 * 1024 * 1024) {
                    alert('File size exceeds 10MB limit. Please choose a smaller file.');
                    this.value = '';
                    return;
                }

                // Hiển thị preview
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewWrap.style.display = 'block';
                    uploadZone.style.borderStyle = 'solid';
                    uploadZone.style.borderColor = '#c9a96e';
                };
                reader.readAsDataURL(file);
            });

            // Xoá ảnh đã chọn
            removeBtn.addEventListener('click', function() {
                imageFile.value = '';
                previewImg.src  = '#';
                previewWrap.style.display  = 'none';
                uploadZone.style.borderStyle  = 'dashed';
                uploadZone.style.borderColor  = '#d1d5db';
            });

            // Drag & Drop
            uploadZone.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.classList.add('dragover');
            });
            uploadZone.addEventListener('dragleave', function() {
                this.classList.remove('dragover');
            });
            uploadZone.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    imageFile.files = files;
                    imageFile.dispatchEvent(new Event('change'));
                }
            });

            // ── Submit button loading state ────────────────
            document.getElementById('hotelCreateForm').addEventListener('submit', function() {
                const btn = document.getElementById('submitBtn');
                btn.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                         viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                         style="animation: spin 1s linear infinite;">
                        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                    </svg>
                    Saving...
                `;
                btn.disabled = true;
            });

        });
    </script>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

</body>
</html>

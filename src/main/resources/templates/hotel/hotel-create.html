<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/frag :: head}"></head>

<body class="d-flex flex-column min-vh-100">
<link rel="stylesheet" th:href="@{/assets/css/hotel-create.css}" />

<nav th:replace="~{fragment/frag :: navBar}"></nav>

<!-- Hero Banner -->
<section class="create-hero border-bottom border-warning-subtle">
    <div class="container">
        <nav aria-label="breadcrumb" class="mb-3">
            <a href="/hotels" class="bc-link">Hotels</a>
            <span class="bc-sep">/</span>
            <span class="bc-active">Add New Hotel</span>
        </nav>
        <h1>Add New Hotel</h1>
        <p>Fill in the details below to register a new hotel into the system.</p>
    </div>
</section>

<!-- Main Content -->
<main class="flex-grow-1 py-4" style="background:var(--cream);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">

                <!-- Flash messages (dùng Bootstrap alert + Bootstrap Icons) -->
                <div th:if="${successMessage}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
                    <i class="bi bi-check-circle-fill"></i>
                    <span th:text="${successMessage}"></span>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span th:text="${errorMessage}"></span>
                </div>

                <!-- Form Card -->
                <div class="form-card">
                    <div class="form-card-header">
                        <i class="bi bi-building text-gold"></i>
                        <h5>Hotel Information</h5>
                    </div>

                    <div class="form-card-body">
                        <form action="/hotels/new" method="post" enctype="multipart/form-data" id="hotelCreateForm">

                            <!-- Tên khách sạn -->
                            <div class="mb-4">
                                <label class="form-label-custom" for="hotelName">
                                    Hotel Name <span class="text-danger">*</span>
                                </label>
                                <input type="text" name="name" id="hotelName" class="fc"
                                       placeholder="e.g. Lion Hotel 6" required maxlength="200" />
                            </div>

                            <!-- Địa chỉ -->
                            <div class="mb-4">
                                <label class="form-label-custom" for="hotelAddress">
                                    Address <span class="text-danger">*</span>
                                </label>
                                <input type="text" name="address" id="hotelAddress" class="fc"
                                       placeholder="e.g. 123 Nguyen Van Cu, Can Tho"
                                       required maxlength="500" />
                            </div>

                            <div class="row g-4 mb-4">
                                <!-- Số sao -->
                                <div class="col-12">
                                    <label class="form-label-custom" for="ratingSelect">
                                        Star Rating <span class="text-danger">*</span>
                                    </label>
                                    <select name="rating" id="ratingSelect" class="fc" required>
                                        <option th:each="star : ${#numbers.sequence(1, 5)}"
                                                th:value="${star}" th:text="${star + ' ★'}"
                                                th:selected="${star == 3}">3 ★</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Trạng thái hoạt động -->
                            <div class="mb-4">
                                <label class="form-label-custom">Status</label>
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" role="switch"
                                           id="activeCheckbox" name="active" value="true" checked />
                                    <label class="form-check-label fw-semibold" for="activeCheckbox">
                                        Hotel Active
                                    </label>
                                </div>
                            </div>

                            <div class="form-divider"></div>

                            <!-- Upload ảnh -->
                            <div class="mb-4">
                                <label class="form-label-custom" for="imageFile">Hotel Image</label>
                                <input type="file" name="imageFile" id="imageFile" class="form-control"
                                       accept="image/jpeg,image/png,image/webp,image/jpg" />
                                <div class="form-text text-muted mt-1">JPG, PNG, WEBP · Max 10MB</div>
                            </div>

                            <div class="form-divider"></div>

                            <!-- Buttons -->
                            <div class="d-flex gap-3 justify-content-end flex-wrap">
                                <a href="/hotels" class="btn-cancel">
                                    <i class="bi bi-arrow-left"></i>
                                    Cancel
                                </a>
                                <button type="submit" class="btn-submit" id="submitBtn">
                                    <i class="bi bi-floppy"></i>
                                    Save Hotel
                                </button>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragment/frag :: footer}"></footer>
<div th:replace="~{fragment/frag :: scripts}"></div>
</body>
</html>

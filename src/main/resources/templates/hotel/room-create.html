<!DOCTYPE html>
<!--
    hotel/room-create.html
    Form thêm phòng mới cho một khách sạn
    Fields: type, price, description, window (int), bed (int), acreage, person, imageFile
-->
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/fag :: head}"></head>

<body class="d-flex flex-column min-vh-100">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --navy:      #0a1628;
            --navy-lt:   #142038;
            --gold:      #c9a96e;
            --gold-dk:   #a8824e;
            --gold-lt:   #e8d5a3;
            --cream:     #faf8f4;
            --radius:    14px;
            --shadow:    0 8px 32px rgba(10,22,40,.12);
            --tr:        .3s cubic-bezier(.4,0,.2,1);
        }

        body { font-family: 'Inter', sans-serif; background: var(--cream); }

        /* ── Hero ── */
        .create-hero {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy-lt) 70%, #1e3a5f 100%);
            padding: 40px 0 32px;
        }
        .create-hero h1 {
            font-family: 'Playfair Display', serif;
            color: #fff; font-size: clamp(1.4rem,3vw,2rem); margin-bottom: 6px;
        }
        .create-hero p { color: var(--gold-lt); font-size: .88rem; opacity: .8; margin: 0; }
        .bc-link { color: var(--gold-lt); text-decoration: none; font-size: .82rem; opacity: .8; }
        .bc-link:hover { opacity:1; color: var(--gold); }
        .bc-sep { color: rgba(201,169,110,.4); margin: 0 6px; }
        .bc-active { color: var(--gold); font-size: .82rem; font-weight: 500; }
        .hero-divider { width:50px; height:3px; background: linear-gradient(90deg,var(--gold),var(--gold-lt)); border-radius:99px; margin:14px 0 0; }

        /* ── Form card ── */
        .form-card { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); border:1px solid #e9ecef; overflow:hidden; margin-bottom:40px; }
        .form-card-header { background:linear-gradient(135deg,var(--navy),var(--navy-lt)); padding:18px 24px; display:flex; align-items:center; gap:10px; }
        .form-card-header h5 { font-family:'Playfair Display',serif; color:#fff; font-size:1rem; margin:0; }
        .form-card-body { padding:28px 24px; }

        /* ── Inputs ── */
        .lbl { font-size:.73rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:#6b7280; margin-bottom:6px; display:block; }
        .fc {
            display:block; width:100%; padding:10px 14px;
            border:1.5px solid #e5e7eb; border-radius:10px;
            font-size:.9rem; color:#1a1a2e; background:#fafafa;
            transition:var(--tr); font-family:'Inter',sans-serif;
        }
        .fc:focus { outline:none; border-color:var(--gold); background:#fff; box-shadow:0 0 0 3px rgba(201,169,110,.15); }

        /* ── Stepper input (window, bed, person) ── */
        .stepper { display:flex; align-items:center; gap:0; border:1.5px solid #e5e7eb; border-radius:10px; overflow:hidden; background:#fafafa; }
        .stepper-btn {
            width:42px; height:44px; border:none; background:transparent;
            font-size:1.2rem; cursor:pointer; color:#6b7280;
            transition:background var(--tr), color var(--tr);
            display:flex; align-items:center; justify-content:center;
            flex-shrink:0;
        }
        .stepper-btn:hover { background:rgba(201,169,110,.1); color:var(--gold-dk); }
        .stepper input[type="number"] {
            flex:1; border:none; background:transparent; text-align:center;
            font-size:.95rem; font-weight:600; color:#1a1a2e;
            font-family:'Inter',sans-serif; min-width:0;
            -moz-appearance:textfield;
        }
        .stepper input[type="number"]::-webkit-inner-spin-button,
        .stepper input[type="number"]::-webkit-outer-spin-button { display:none; }
        .stepper input[type="number"]:focus { outline:none; }
        .stepper:focus-within { border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,169,110,.15); }

        /* ── Image upload zone ── */
        .img-zone {
            border:2px dashed #d1d5db; border-radius:var(--radius);
            padding:28px 20px; text-align:center; cursor:pointer;
            transition:var(--tr); background:#fafafa; position:relative;
        }
        .img-zone:hover, .img-zone.dragover { border-color:var(--gold); background:rgba(201,169,110,.04); }
        .img-zone input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
        .img-zone-icon { color:#9ca3af; margin-bottom:8px; }
        .img-zone-text { font-size:.85rem; color:#6b7280; }
        .img-zone-hint { font-size:.72rem; color:#9ca3af; margin-top:3px; }

        #previewWrap { margin-top:12px; display:none; border-radius:10px; overflow:hidden; border:1.5px solid var(--gold-lt); }
        #previewImg { width:100%; max-height:200px; object-fit:cover; display:block; }
        .preview-remove {
            width:100%; padding:7px; border:none; background:#fff;
            font-size:.78rem; color:#ef4444; cursor:pointer; font-weight:600;
            display:flex; align-items:center; justify-content:center; gap:5px;
            transition:background .2s;
        }
        .preview-remove:hover { background:#fef2f2; }

        /* ── Divider ── */
        .fdivider { height:1px; background:#f3f4f6; margin:24px 0; }

        /* ── Buttons ── */
        .btn-submit {
            background:linear-gradient(135deg,var(--gold-dk),var(--gold));
            color:#fff; border:none; border-radius:10px;
            padding:12px 28px; font-weight:700; font-size:.9rem;
            cursor:pointer; display:inline-flex; align-items:center; gap:7px;
            transition:var(--tr);
        }
        .btn-submit:hover {
            background:linear-gradient(135deg,var(--navy),var(--navy-lt));
            color:var(--gold-lt); transform:translateY(-1px);
            box-shadow:0 6px 20px rgba(168,130,78,.35);
        }
        .btn-cancel {
            background:transparent; color:#6b7280; border:1.5px solid #e5e7eb;
            border-radius:10px; padding:11px 24px; font-size:.88rem; font-weight:500;
            cursor:pointer; text-decoration:none;
            display:inline-flex; align-items:center; gap:6px; transition:var(--tr);
        }
        .btn-cancel:hover { border-color:#9ca3af; color:#374151; background:#f9fafb; text-decoration:none; }

        /* ── Alerts ── */
        .alert-ok  { background:#f0fdf4; border:1px solid #bbf7d0; border-radius:10px; padding:12px 16px; color:#16a34a; font-size:.88rem; font-weight:500; display:flex; align-items:center; gap:8px; margin-bottom:20px; }
        .alert-err { background:#fef2f2; border:1px solid #fecaca; border-radius:10px; padding:12px 16px; color:#dc2626; font-size:.88rem; font-weight:500; display:flex; align-items:center; gap:8px; margin-bottom:20px; }

        @keyframes spin { to { transform:rotate(360deg); } }
    </style>

    <!-- NAVBAR -->
    <nav th:replace="~{fragment/fag :: navBar}"></nav>

    <!-- HERO BANNER -->
    <section class="create-hero">
        <div class="container">
            <!-- Breadcrumb -->
            <div class="mb-3">
                <a href="/hotels" class="bc-link">Hotels</a>
                <span class="bc-sep">/</span>
                <a th:href="@{/hotels/{id}/rooms(id=${hotel.id})}"
                   class="bc-link" th:text="${hotel.name}">Hotel</a>
                <span class="bc-sep">/</span>
                <span class="bc-active">Add Room</span>
            </div>
            <h1>Add New Room</h1>
            <p th:text="'Adding room for: ' + ${hotel.name} + ' · ' + ${hotel.address}">Hotel info</p>
            <div class="hero-divider"></div>
        </div>
    </section>

    <!-- MAIN CONTENT -->
    <main class="flex-grow-1 py-4" style="background:var(--cream);">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-8">

                    <!-- Flash messages -->
                    <div th:if="${successMessage}" class="alert-ok">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2.5"
                             stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        <span th:text="${successMessage}"></span>
                    </div>
                    <div th:if="${errorMessage}" class="alert-err">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2.5"
                             stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        <span th:text="${errorMessage}"></span>
                    </div>

                    <!-- Form card -->
                    <div class="form-card">
                        <div class="form-card-header">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                 fill="none" stroke="#c9a96e" stroke-width="2"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                            <h5>Room Information</h5>
                        </div>

                        <div class="form-card-body">
                            <form th:action="@{/hotels/{id}/rooms/new(id=${hotel.id})}"
                                  method="post" enctype="multipart/form-data" id="roomForm">

                                <!-- ── Loại phòng ── -->
                                <div class="mb-4">
                                    <label class="lbl">Room Type <span style="color:#ef4444;">*</span></label>
                                    <input type="text" name="type" id="roomType" class="fc"
                                           placeholder="e.g. Standard, Deluxe, Suite, Family"
                                           required maxlength="100" />
                                </div>

                                <!-- ── Giá + Diện tích ── -->
                                <div class="row g-4 mb-4">
                                    <div class="col-12 col-sm-6">
                                        <label class="lbl">Price / Night (VND) <span style="color:#ef4444;">*</span></label>
                                        <input type="number" name="price" id="roomPrice" class="fc"
                                               placeholder="e.g. 500000" min="0" step="1" required />
                                    </div>
                                    <div class="col-12 col-sm-6">
                                        <label class="lbl">Area (m²) <span style="color:#ef4444;">*</span></label>
                                        <input type="number" name="acreage" id="roomAcreage" class="fc"
                                               placeholder="e.g. 25" min="1" step="0.1" required />
                                    </div>
                                </div>

                                <!-- ── Số người + Giường + Cửa sổ ── -->
                                <div class="row g-4 mb-4">
                                    <!-- Số người -->
                                    <div class="col-12 col-sm-4">
                                        <label class="lbl">Max Guests <span style="color:#ef4444;">*</span></label>
                                        <div class="stepper">
                                            <button type="button" class="stepper-btn" data-target="personInput" data-op="minus">−</button>
                                            <input type="number" name="person" id="personInput" value="2" min="1" max="20" />
                                            <button type="button" class="stepper-btn" data-target="personInput" data-op="plus">+</button>
                                        </div>
                                    </div>
                                    <!-- Số giường -->
                                    <div class="col-12 col-sm-4">
                                        <label class="lbl">Beds</label>
                                        <div class="stepper">
                                            <button type="button" class="stepper-btn" data-target="bedInput" data-op="minus">−</button>
                                            <input type="number" name="bed" id="bedInput" value="1" min="0" max="10" />
                                            <button type="button" class="stepper-btn" data-target="bedInput" data-op="plus">+</button>
                                        </div>
                                    </div>
                                    <!-- Số cửa sổ -->
                                    <div class="col-12 col-sm-4">
                                        <label class="lbl">Windows</label>
                                        <div class="stepper">
                                            <button type="button" class="stepper-btn" data-target="windowInput" data-op="minus">−</button>
                                            <input type="number" name="window" id="windowInput" value="0" min="0" max="10" />
                                            <button type="button" class="stepper-btn" data-target="windowInput" data-op="plus">+</button>
                                        </div>
                                    </div>
                                </div>

                                <!-- ── Mô tả phòng ── -->
                                <div class="mb-4">
                                    <label class="lbl">Description</label>
                                    <textarea name="description" id="roomDesc" class="fc"
                                              rows="4" placeholder="Describe the room's features, view, amenities..."
                                              style="resize:vertical;"></textarea>
                                </div>

                                <div class="fdivider"></div>

                                <!-- ── Upload ảnh phòng ── -->
                                <div class="mb-4">
                                    <label class="lbl">Room Image</label>
                                    <div class="img-zone" id="uploadZone">
                                        <input type="file" name="imageFile" id="imageFile"
                                               accept="image/jpeg,image/png,image/webp,image/jpg" />
                                        <div class="img-zone-icon">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="38" height="38"
                                                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                 stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                                <polyline points="21 15 16 10 5 21"/>
                                            </svg>
                                        </div>
                                        <div class="img-zone-text"><strong>Click to upload</strong> or drag & drop</div>
                                        <div class="img-zone-hint">JPG, PNG, WEBP · Max 10MB</div>
                                    </div>
                                    <!-- Preview -->
                                    <div id="previewWrap">
                                        <img id="previewImg" src="#" alt="Preview" />
                                        <button type="button" class="preview-remove" id="removeImg">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13"
                                                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                                <polyline points="3 6 5 6 21 6"/>
                                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                                            </svg>
                                            Remove Image
                                        </button>
                                    </div>
                                </div>

                                <div class="fdivider"></div>

                                <!-- ── Buttons ── -->
                                <div class="d-flex gap-3 justify-content-end flex-wrap">
                                    <a th:href="@{/hotels/{id}/rooms(id=${hotel.id})}" class="btn-cancel">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                                             viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                            <line x1="19" y1="12" x2="5" y2="12"/>
                                            <polyline points="12 19 5 12 12 5"/>
                                        </svg>
                                        Cancel
                                    </a>
                                    <button type="submit" class="btn-submit" id="submitBtn">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                                             viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                                            <polyline points="17 21 17 13 7 13 7 21"/>
                                            <polyline points="7 3 7 8 15 8"/>
                                        </svg>
                                        Save Room
                                    </button>
                                </div>

                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer th:replace="~{fragment/fag :: footer}"></footer>

    <!-- SCRIPTS -->
    <div th:replace="~{fragment/fag :: scripts}"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {

            // ── Stepper buttons (person, bed, window) ──────────
            document.querySelectorAll('.stepper-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    const input = document.getElementById(this.dataset.target);
                    const op    = this.dataset.op;
                    const min   = parseInt(input.min) || 0;
                    const max   = parseInt(input.max) || 99;
                    let   val   = parseInt(input.value) || 0;

                    if (op === 'plus'  && val < max) input.value = val + 1;
                    if (op === 'minus' && val > min) input.value = val - 1;
                });
            });

            // ── Image Upload Preview ───────────────────────────
            const imageFile  = document.getElementById('imageFile');
            const previewWrap = document.getElementById('previewWrap');
            const previewImg  = document.getElementById('previewImg');
            const removeBtn   = document.getElementById('removeImg');
            const uploadZone  = document.getElementById('uploadZone');

            imageFile.addEventListener('change', function() {
                const file = this.files[0];
                if (!file) return;
                if (file.size > 10 * 1024 * 1024) {
                    alert('File size exceeds 10MB. Please choose a smaller file.');
                    this.value = '';
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImg.src = e.target.result;
                    previewWrap.style.display = 'block';
                    uploadZone.style.borderStyle = 'solid';
                    uploadZone.style.borderColor  = '#c9a96e';
                };
                reader.readAsDataURL(file);
            });

            removeBtn.addEventListener('click', function() {
                imageFile.value = '';
                previewImg.src  = '#';
                previewWrap.style.display = 'none';
                uploadZone.style.borderStyle = 'dashed';
                uploadZone.style.borderColor  = '#d1d5db';
            });

            // Drag & Drop
            uploadZone.addEventListener('dragover', function(e) { e.preventDefault(); this.classList.add('dragover'); });
            uploadZone.addEventListener('dragleave', function() { this.classList.remove('dragover'); });
            uploadZone.addEventListener('drop', function(e) {
                e.preventDefault(); this.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) { imageFile.files = files; imageFile.dispatchEvent(new Event('change')); }
            });

            // ── Submit loading state ───────────────────────────
            document.getElementById('roomForm').addEventListener('submit', function() {
                const btn = document.getElementById('submitBtn');
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round"
                    style="animation:spin 1s linear infinite;">
                    <path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Saving...`;
                btn.disabled = true;
            });

        });
    </script>

</body>
</html>

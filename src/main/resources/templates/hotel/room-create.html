<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragment/frag :: head}"></head>

<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragment/frag :: navBar}"></nav>

<!-- Hero Banner -->
<section class="create-hero">
    <div class="container">
        <nav aria-label="breadcrumb" class="mb-3">
            <a href="/hotels" class="bc-link">Hotels</a>
            <span class="bc-sep">/</span>
            <a th:href="@{/hotels/{id}/rooms(id=${hotel.id})}"
               class="bc-link" th:text="${hotel.name}">Hotel</a>
            <span class="bc-sep">/</span>
            <span class="bc-active">Add Room</span>
        </nav>
        <h1>Add New Room</h1>
        <p th:text="'Adding room for: ' + ${hotel.name} + ' · ' + ${hotel.address}">Hotel info</p>
        <div class="hero-divider"></div>
    </div>
</section>

<!-- Main Content -->
<main class="flex-grow-1 py-4" style="background:var(--cream);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">

                <!-- Flash messages -->
                <div th:if="${successMessage}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
                    <i class="bi bi-check-circle-fill"></i>
                    <span th:text="${successMessage}"></span>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span th:text="${errorMessage}"></span>
                </div>

                <!-- Form Card -->
                <div class="form-card">
                    <div class="form-card-header">
                        <i class="bi bi-door-open text-gold"></i>
                        <h5>Room Information</h5>
                    </div>

                    <div class="form-card-body">
                        <form th:action="@{/hotels/{id}/rooms/new(id=${hotel.id})}"
                              method="post" enctype="multipart/form-data" id="roomForm">

                            <!-- Loại phòng -->
                            <div class="mb-4">
                                <label class="lbl" for="roomType">Room Type <span class="text-danger">*</span></label>
                                <input type="text" name="type" id="roomType" class="fc"
                                       placeholder="e.g. Standard, Deluxe, Suite, Family"
                                       required maxlength="100" />
                            </div>

                            <!-- Giá + Diện tích -->
                            <div class="row g-4 mb-4">
                                <div class="col-12 col-sm-6">
                                    <label class="lbl" for="roomPrice">Price / Night (VND) <span class="text-danger">*</span></label>
                                    <input type="number" name="price" id="roomPrice" class="fc"
                                           placeholder="e.g. 500000" min="0" step="1" required />
                                </div>
                                <div class="col-12 col-sm-6">
                                    <label class="lbl" for="roomAcreage">Area (m²) <span class="text-danger">*</span></label>
                                    <input type="number" name="acreage" id="roomAcreage" class="fc"
                                           placeholder="e.g. 25" min="1" step="0.1" required />
                                </div>
                            </div>

                            <!-- Số người / Giường / Cửa sổ -->
                            <div class="row g-4 mb-4">
                                <div class="col-12 col-sm-4">
                                    <label class="lbl" for="personInput">Max Guests <span class="text-danger">*</span></label>
                                    <input type="number" name="person" id="personInput" class="fc"
                                           value="2" min="1" max="20" required />
                                </div>
                                <div class="col-12 col-sm-4">
                                    <label class="lbl" for="bedInput">Beds</label>
                                    <input type="number" name="bed" id="bedInput" class="fc"
                                           value="1" min="0" max="10" />
                                </div>
                                <div class="col-12 col-sm-4">
                                    <label class="lbl" for="windowInput">Windows</label>
                                    <input type="number" name="window" id="windowInput" class="fc"
                                           value="0" min="0" max="10" />
                                </div>
                            </div>

                            <!-- Mô tả -->
                            <div class="mb-4">
                                <label class="lbl" for="roomDesc">Description</label>
                                <textarea name="description" id="roomDesc" class="fc" rows="4"
                                          placeholder="Describe the room's features, view, amenities..."
                                          style="resize:vertical;"></textarea>
                            </div>

                            <!-- Room Facilities -->
                            <div class="mb-4">
                                <label class="lbl" for="roomFacilities">Room Facilities</label>
                                <textarea name="facilities" id="roomFacilities" class="fc" rows="2"
                                          placeholder="e.g. Air conditioning, Safety deposit box, Flat-screen TV, Desk, Wardrobe (comma-separated)"></textarea>
                                <div class="form-text text-muted mt-1">Enter facilities separated by commas.</div>
                            </div>

                            <!-- Bathroom Amenities -->
                            <div class="mb-4">
                                <label class="lbl" for="bathroomAmenities">Bathroom Amenities</label>
                                <textarea name="bathroomAmenities" id="bathroomAmenities" class="fc" rows="2"
                                          placeholder="e.g. Free toiletries, Towels, Shower, Slippers, Hairdryer (comma-separated)"></textarea>
                                <div class="form-text text-muted mt-1">Enter bathroom amenities separated by commas.</div>
                            </div>

                            <div class="fdivider"></div>

                            <!-- Upload ảnh -->
                            <div class="mb-4">
                                <label class="lbl" for="imageFile">Room Image</label>
                                <input type="file" name="imageFile" id="imageFile" class="form-control"
                                       accept="image/jpeg,image/png,image/webp,image/jpg" />
                                <div class="form-text text-muted mt-1">JPG, PNG, WEBP · Max 10MB</div>
                            </div>

                            <div class="fdivider"></div>

                            <!-- Buttons -->
                            <div class="d-flex gap-3 justify-content-end flex-wrap">
                                <a th:href="@{/hotels/{id}/rooms(id=${hotel.id})}" class="btn-cancel">
                                    <i class="bi bi-arrow-left"></i>
                                    Cancel
                                </a>
                                <button type="submit" class="btn-submit" id="submitBtn">
                                    <i class="bi bi-floppy"></i>
                                    Save Room
                                </button>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragment/frag :: footer}"></footer>
<div th:replace="~{fragment/frag :: scripts}"></div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Nhúng fragment head đã có sẵn bootstrap, custom css -->
<head th:replace="~{fragment/frag :: head}"></head>

<body class="d-flex flex-column profile-body-layout">
    <!-- Nhúng thanh điều hướng navBar chứa Avatar Dropdown -->
    <nav th:replace="~{fragment/frag :: navBar}"></nav>

    <!-- Khu vực hiển thị thông tin chính -->
    <main class="container mt-5 flex-grow-1">
        <div class="row">
            <!-- Giao diện nhập mã OTP -->
            <div class="col-lg-8 mx-auto">
                <!-- Hiển thị thông báo lỗi nếu có -->
                <div th:if="${errorMessage}" class="alert alert-danger border-0 px-3 py-2 mb-3 profile-alert-box" th:text="${errorMessage}"></div>
                <div th:if="${successMessage}" class="alert alert-success border-0 px-3 py-2 mb-3 profile-alert-box" th:text="${successMessage}"></div>

                <!-- Card nhập OTP. Bo góc 8px, shadow mờ nhẹ -->
                <div class="card border-0 shadow-sm mb-4 profile-card">
                    <!-- Phần header màu Primary Navy (#0f4c81) -->
                    <div class="card-header text-white text-center py-4 profile-card-header">
                        <h3 class="mb-1 fw-bold">Verify OTP</h3>
                        <p class="mb-0 text-white-50">Enter the verification code to edit profile</p>
                    </div>

                    <!-- Nội dung nhập OTP -->
                    <div class="card-body p-4">
                        <form th:action="@{/profile/verify-edit}" method="POST">
                            <div class="mb-3 text-center">
                                <p class="text-muted">We have sent a 6-digit OTP code to your current email: <strong th:text="${pendingEmail}">email@example.com</strong>. Please check your inbox.</p>
                            </div>

                            <!-- Ô nhập mã OTP -->
                            <div class="mb-4">
                                <label for="otp" class="form-label text-muted fw-semibold d-block text-center profile-label-sm">ENTER 6-DIGIT OTP CODE</label>
                                <input type="text" class="form-control mx-auto text-center fw-bold profile-otp-input" id="otp" name="otp" placeholder="123456" maxlength="6" required/>
                            </div>

                            <!-- Các nút hành động -->
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn text-white w-50 profile-btn-primary">
                                    Verify & Edit
                                </button>
                                <a th:href="@{/profile}" class="btn btn-outline-secondary w-50 profile-btn-secondary">
                                    Back
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Nhúng footer chân trang -->
    <footer th:replace="~{fragment/frag :: footer}"></footer>

    <!-- Nhúng thư viện scripts JS -->
    <div th:replace="~{fragment/frag :: scripts}"></div>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const form = document.querySelector("form");
        if (form) {
            form.addEventListener("submit", function() {
                const button = form.querySelector("button[type='submit']");
                if (button) {
                    button.disabled = true;
                    button.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Verifying...';
                }
            });
        }
    });
</script>
</body>
</html>

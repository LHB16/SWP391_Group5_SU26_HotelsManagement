<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Nhúng fragment head đã có sẵn bootstrap, custom css -->
<head th:replace="~{fragment/frag :: head}"></head>

<body class="d-flex flex-column profile-body-layout">
    <!-- Nhúng thanh điều hướng navBar chứa Avatar Dropdown -->
    <nav th:replace="~{fragment/frag :: navBar}"></nav>

    <!-- Khu vực hiển thị thông tin chính -->
    <main class="container mt-5 flex-grow-1">
        <div class="row">
            <!-- Giao diện nhập mã OTP cho email mới -->
            <div class="col-lg-8 mx-auto">
                <!-- Hiển thị thông báo lỗi nếu có -->
                <div th:if="${errorMessage}" class="alert alert-danger border-0 px-3 py-2 mb-3 profile-alert-box" th:text="${errorMessage}"></div>
                <div th:if="${successMessage}" class="alert alert-success border-0 px-3 py-2 mb-3 profile-alert-box" th:text="${successMessage}"></div>

                <!-- Card nhập OTP. Bo góc 8px, shadow mờ nhẹ -->
                <div class="card border-0 shadow-sm mb-4 profile-card">
                    <!-- Phần header màu Primary Navy (#0f4c81) -->
                    <div class="card-header text-white text-center py-4 profile-card-header">
                        <h3 class="mb-1 fw-bold">Verify New Email</h3>
                        <p class="mb-0 text-white-50">Enter the verification code sent to your new email address</p>
                    </div>

                    <!-- Nội dung nhập OTP -->
                    <div class="card-body p-4">
                        <form th:action="@{/profile/verify-new-email}" method="POST">
                            <div class="mb-3 text-center">
                                <p class="text-muted">We have sent a 6-digit OTP code to your new email: <strong th:text="${pendingEmail}">newemail@example.com</strong>. Please check its inbox.</p>
                            </div>

                            <!-- Ô nhập mã OTP -->
                            <div class="mb-4">
                                <label for="otp" class="form-label text-muted fw-semibold d-block text-center profile-label-sm">ENTER 6-DIGIT OTP CODE</label>
                                <input type="text" class="form-control mx-auto text-center fw-bold profile-otp-input" id="otp" name="otp" placeholder="123456" maxlength="6" required/>
                            </div>

                            <!-- Các nút hành động -->
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn text-white w-50 profile-btn-primary">
                                    Confirm Change
                                </button>
                                <a th:href="@{/profile/cancel-edit}" class="btn btn-outline-secondary w-50 profile-btn-secondary">
                                    Cancel
                                </a>
                            </div>

                            <!-- Nút gửi lại OTP -->
                            <div class="text-center mt-3">
                                <button type="button" id="resendOtpBtn" class="btn btn-link text-decoration-none small text-muted p-0" disabled>
                                    Gửi lại OTP (60s)
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Nhúng footer chân trang -->
    <footer th:replace="~{fragment/frag :: footer}"></footer>

    <!-- Nhúng thư viện scripts JS -->
    <div th:replace="~{fragment/frag :: scripts}"></div>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        const form = document.querySelector("form");
        if (form) {
            form.addEventListener("submit", function() {
                const button = form.querySelector("button[type='submit']");
                if (button) {
                    button.disabled = true;
                    button.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Verifying...';
                }
            });
        }

        const resendBtn = document.getElementById("resendOtpBtn");
        if (resendBtn) {
            let cooldown = [[${cooldown}]];
            let countdownTimer;

            function startCountdown(duration) {
                if (duration <= 0) {
                    resendBtn.disabled = false;
                    resendBtn.innerText = "Gửi lại OTP";
                    resendBtn.classList.remove("text-muted");
                    resendBtn.classList.add("text-primary");
                    return;
                }
                resendBtn.disabled = true;
                resendBtn.classList.add("text-muted");
                resendBtn.classList.remove("text-primary");
                resendBtn.innerText = `Gửi lại OTP (${duration}s)`;

                clearInterval(countdownTimer);
                countdownTimer = setInterval(() => {
                    duration--;
                    if (duration <= 0) {
                        clearInterval(countdownTimer);
                        resendBtn.disabled = false;
                        resendBtn.innerText = "Gửi lại OTP";
                        resendBtn.classList.remove("text-muted");
                        resendBtn.classList.add("text-primary");
                    } else {
                        resendBtn.innerText = `Gửi lại OTP (${duration}s)`;
                    }
                }, 1000);
            }

            startCountdown(cooldown);

            resendBtn.addEventListener("click", function() {
                resendBtn.disabled = true;
                resendBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Đang gửi...';

                fetch("/resend-otp?type=profile_new_email", {
                    method: "POST"
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert(data.message || "Đã gửi lại mã OTP thành công!");
                        startCountdown(data.nextCooldown);
                    } else {
                        alert(data.message || "Gửi lại mã OTP thất bại!");
                        if (data.remainingSeconds) {
                            startCountdown(data.remainingSeconds);
                        } else {
                            resendBtn.disabled = false;
                            resendBtn.innerText = "Gửi lại OTP";
                            resendBtn.classList.remove("text-muted");
                            resendBtn.classList.add("text-primary");
                        }
                    }
                })
                .catch(error => {
                    console.error("Error resending OTP:", error);
                    alert("Lỗi hệ thống. Vui lòng thử lại sau.");
                    resendBtn.disabled = false;
                    resendBtn.innerText = "Gửi lại OTP";
                    resendBtn.classList.remove("text-muted");
                    resendBtn.classList.add("text-primary");
                });
            });
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragment/frag :: head}"></head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragment/frag :: navBar}"></nav>

<main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container d-flex justify-content-center">
        <div class="card shadow" style="width: 420px;">
            <div class="card-header login-header text-center">
                <h4 class="mb-0">Create Customer Account</h4>
            </div>
            <div class="card-body p-4">

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form method="post" action="/register">
                    <input type="hidden" name="role" value="CUSTOMER"/>

                    <div class="mb-3">
                        <label class="form-label">Full Name <span class="text-danger">*</span></label>
                        <input type="text" name="fullName" class="form-control"
                               placeholder="Enter your full name..."
                               th:value="${fullName}"
                               required minlength="2" maxlength="255"/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Username <span class="text-danger">*</span></label>
                        <input type="text" id="regUsername" name="username" class="form-control"
                               placeholder="Enter your username..."
                               th:value="${username}"
                               required/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email <span class="text-danger">*</span></label>
                        <input type="email" name="email" class="form-control"
                               placeholder="Enter your email..."
                               th:value="${email}"
                               required/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="password" id="regPassword" name="password" class="form-control"
                                   placeholder="Enter your password..."
                                   required/>
                            <button class="btn password-toggle-btn" type="button" id="toggleRegPasswordBtn" onclick="togglePasswordVisibility('regPassword', 'toggleRegPasswordIcon')">
                                <i class="bi bi-eye-slash" id="toggleRegPasswordIcon"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Confirm Password <span class="text-danger">*</span></label>
                        <div class="input-group">
                            <input type="password" id="regConfirmPassword" class="form-control"
                                   placeholder="Confirm your password..."
                                   required/>
                            <button class="btn password-toggle-btn" type="button" id="toggleRegConfirmPasswordBtn" onclick="togglePasswordVisibility('regConfirmPassword', 'toggleRegConfirmPasswordIcon')">
                                <i class="bi bi-eye-slash" id="toggleRegConfirmPasswordIcon"></i>
                            </button>
                        </div>
                        <div id="regMatchError" class="text-danger small mt-1" style="display:none;">
                            Passwords do not match!
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100">Register as Customer</button>
                </form>

                <div class="text-center mt-3">
                <span class="text-muted small">Are you a hotel owner?
                    <a th:href="@{/register-owner}" class="fw-bold">Register as Owner</a>
                </span>
                </div>

                <div class="text-center mt-2">
                <span class="text-muted small">Already have an account?
                    <a th:href="@{/login}">Login here</a>
                </span>
                </div>

            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragment/frag :: footer}"></footer>
<div th:replace="~{fragment/frag :: scripts}"></div>
<script th:src="@{/assets/js/register-validation.js}"></script>
</body>
</html>

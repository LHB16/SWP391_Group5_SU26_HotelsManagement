<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Register</title>
    <link th:href="@{/assets/css/bootstrap.css}" rel="stylesheet"/>
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow" style="width: 420px;">
        <div class="card-header bg-success text-white text-center">
            <h4 class="mb-0">Create Account</h4>
        </div>
        <div class="card-body p-4">

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form method="post" action="/register">

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="fullName" class="form-control"
                           placeholder="Enter your full name..."
                           required minlength="2"/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control"
                           placeholder="Enter your username..."
                           required minlength="3"/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="Enter your email..."
                           required/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control"
                           placeholder="Enter your password..."
                           required minlength="6"/>
                </div>

                <button type="submit" class="btn btn-success w-100">Register</button>
            </form>

            <div class="text-center mt-3">
                <span class="text-muted small">Already have an account?
                    <a th:href="@{/login}">Login here</a>
                </span>
            </div>

        </div>
    </div>
</div>

<script th:src="@{/assets/js/bootstrap.bundle.js}"></script>
</body>
</html>

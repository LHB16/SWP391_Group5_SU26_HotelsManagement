<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragment/frag :: head}"></head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragment/frag :: navBar}"></nav>

<main class="flex-grow-1 d-flex align-items-center py-5">
<div class="container d-flex justify-content-center">
    <div class="card shadow" style="width: 420px;">
        <div class="card-header forgot-password-card-header text-center">
            <h4 class="mb-0 forgot-password-title">Forgot Password</h4>
        </div>
        <div class="card-body p-4">

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form method="post" th:action="@{/forgot-password}">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email"
                           class="form-control"
                           placeholder="Enter your email..."
                           th:value="${email}"
                           required/>
                </div>

                <button type="submit" class="btn btn-primary w-100">Send OTP</button>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/login}" class="text-muted small">Back to Login</a>
            </div>

        </div>
    </div>
</div>
</main>

<footer th:replace="~{fragment/frag :: footer}"></footer>
<div th:replace="~{fragment/frag :: scripts}"></div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Forgot Password</title>
    <link th:href="@{/assets/css/bootstrap.css}" rel="stylesheet"/>
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow" style="width: 420px;">
        <div class="card-header bg-primary text-white text-center">
            <h4 class="mb-0">Forgot Password</h4>
        </div>
        <div class="card-body p-4">

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form method="post" th:action="@{/forgot-password}">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" name="email"
                           class="form-control"
                           placeholder="Enter your email..."
                           required/>
                </div>

                <button type="submit" class="btn btn-primary w-100">Send OTP</button>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/login}" class="text-muted small">Back to Login</a>
            </div>

        </div>
    </div>
</div>

<script th:src="@{/assets/js/bootstrap.bundle.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragment/frag :: head}"></head>
<link th:href="@{/assets/css/register-validation.css}" rel="stylesheet"/>

<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragment/frag :: navBar}"></nav>

<main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container d-flex justify-content-center">
        <div class="card shadow" style="width: 480px; max-width: 100%;">
            <div class="card-header login-header text-center">
                <h4 class="mb-0">Create Hotel Owner Account</h4>
            </div>
            <div class="card-body p-4">

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form method="post" action="/register-owner" enctype="multipart/form-data">

                    <div class="mb-3">
                        <label class="form-label">Full Name <span class="text-danger">*</span></label>
                        <input type="text" name="fullName" class="form-control"
                               placeholder="Enter your full name..."
                               th:value="${fullName}"
                               required minlength="2" maxlength="255"/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Username <span class="text-danger">*</span></label>
                        <input type="text" id="ownerUsername" name="username" class="form-control"
                               placeholder="Enter your username..."
                               th:value="${username}"
                               required/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email <span class="text-danger">*</span></label>
                        <input type="email" name="email" class="form-control"
                               placeholder="Enter your email..."
                               th:value="${email}"
                               required/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password <span class="text-danger">*</span></label>
                        <input type="password" id="ownerPassword" name="password" class="form-control"
                               placeholder="Enter your password..."
                               required/>
                    </div>

                    <hr class="my-4">

                    <div class="mb-3">
                        <label class="form-label">Phone Number <span class="text-danger">*</span></label>
                        <input type="tel" name="phone" id="phone" class="form-control"
                               placeholder="Enter your phone number..."
                               th:value="${phone}"
                               required/>
                        <div id="phone-error" class="text-danger small mt-1" style="display:none;"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address <span class="text-danger">*</span></label>
                        <input type="text" name="address" class="form-control"
                               placeholder="Enter your address..."
                               th:value="${address}"
                               required/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">ID Card <span class="text-danger">*</span></label>
                        <input type="text" name="idCard" class="form-control"
                               placeholder="Enter your ID card number..."
                               th:value="${idCard}"
                               required/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tax ID <span class="text-danger">*</span></label>
                        <input type="text" name="taxId" class="form-control"
                               placeholder="Enter your tax ID..."
                               th:value="${taxId}"
                               required/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">ID Card Document <span class="text-danger">*</span></label>
                        <input type="file" name="idCardDocument" class="form-control"
                               accept="image/*,application/pdf" required/>
                        <small class="text-muted">Supports JPG, PNG, PDF. Maximum 10MB.</small>
                        <div th:if="${idCardDocumentError}" class="text-danger small" th:text="${idCardDocumentError}"></div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mt-2">Register as Owner</button>
                </form>

                <div class="text-center mt-3">
                    <span class="text-muted small">Are you a customer?
                        <a th:href="@{/register}" class="fw-bold">Register as Customer</a>
                    </span>
                </div>

                <div class="text-center mt-2">
                    <span class="text-muted small">Already have an account?
                        <a th:href="@{/login}">Login here</a>
                    </span>
                </div>

            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragment/frag :: footer}"></footer>
<div th:replace="~{fragment/frag :: scripts}"></div>
<script th:src="@{/assets/js/register-validation.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragment/frag :: head}"></head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragment/frag :: navBar}"></nav>

<main class="flex-grow-1 d-flex align-items-center py-5">
<div class="container d-flex justify-content-center">
    <div class="card shadow" style="width: 420px;">
        <div class="card-header login-header text-center">
            <h4 class="mb-0">Verify OTP</h4>
        </div>
        <div class="card-body p-4">

            <p class="text-center text-muted">
                OTP code has been sent to:<br/>
                <strong th:text="${email}"></strong>
            </p>

            <form method="post" action="/verify-otp">
                <input type="hidden" name="email" th:value="${email}"/>

                <div class="mb-3">
                    <label class="form-label">Enter OTP Code</label>
                    <input type="text" name="otp" class="form-control text-center fs-4"
                           required maxlength="6"
                           placeholder="Enter 6-digit OTP"/>
                </div>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <button type="submit" class="btn btn-primary w-100">Verify</button>
            </form>

            <div class="text-center mt-2">
                <button type="button" id="resendOtpBtn" class="btn btn-link text-decoration-none small text-muted p-0" disabled>
                    Gửi lại OTP (60s)
                </button>
            </div>

            <div class="text-center mt-3">
                <a th:href="@{/register}" class="text-muted small">Back to Register</a>
            </div>

        </div>
    </div>
</div>
</main>

<footer th:replace="~{fragment/frag :: footer}"></footer>
<div th:replace="~{fragment/frag :: scripts}"></div>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        const form = document.querySelector("form");
        if (form) {
            form.addEventListener("submit", function() {
                const button = form.querySelector("button[type='submit']");
                if (button) {
                    button.disabled = true;
                    button.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Verifying...';
                }
            });
        }

        const resendBtn = document.getElementById("resendOtpBtn");
        if (resendBtn) {
            let cooldown = [[${cooldown}]];
            let countdownTimer;

            function startCountdown(duration) {
                if (duration <= 0) {
                    resendBtn.disabled = false;
                    resendBtn.innerText = "Gửi lại OTP";
                    resendBtn.classList.remove("text-muted");
                    resendBtn.classList.add("text-primary");
                    return;
                }
                resendBtn.disabled = true;
                resendBtn.classList.add("text-muted");
                resendBtn.classList.remove("text-primary");
                resendBtn.innerText = `Gửi lại OTP (${duration}s)`;

                clearInterval(countdownTimer);
                countdownTimer = setInterval(() => {
                    duration--;
                    if (duration <= 0) {
                        clearInterval(countdownTimer);
                        resendBtn.disabled = false;
                        resendBtn.innerText = "Gửi lại OTP";
                        resendBtn.classList.remove("text-muted");
                        resendBtn.classList.add("text-primary");
                    } else {
                        resendBtn.innerText = `Gửi lại OTP (${duration}s)`;
                    }
                }, 1000);
            }

            startCountdown(cooldown);

            resendBtn.addEventListener("click", function() {
                resendBtn.disabled = true;
                resendBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Đang gửi...';

                fetch("/resend-otp?type=auth", {
                    method: "POST"
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert(data.message || "Đã gửi lại mã OTP thành công!");
                        startCountdown(data.nextCooldown);
                    } else {
                        alert(data.message || "Gửi lại mã OTP thất bại!");
                        if (data.remainingSeconds) {
                            startCountdown(data.remainingSeconds);
                        } else {
                            resendBtn.disabled = false;
                            resendBtn.innerText = "Gửi lại OTP";
                            resendBtn.classList.remove("text-muted");
                            resendBtn.classList.add("text-primary");
                        }
                    }
                })
                .catch(error => {
                    console.error("Error resending OTP:", error);
                    alert("Lỗi hệ thống. Vui lòng thử lại sau.");
                    resendBtn.disabled = false;
                    resendBtn.innerText = "Gửi lại OTP";
                    resendBtn.classList.remove("text-muted");
                    resendBtn.classList.add("text-primary");
                });
            });
        }
    });
</script>
</body>
</html>

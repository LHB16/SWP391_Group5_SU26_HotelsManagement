<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Verify OTP</title>
    <link th:href="@{/assets/css/bootstrap.css}" rel="stylesheet"/>
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow" style="width: 420px;">
        <div class="card-header bg-primary text-white text-center">
            <h4 class="mb-0">Verify OTP</h4>
        </div>
        <div class="card-body p-4">

            <p class="text-center text-muted">
                OTP code has been sent to:<br/>
                <strong th:text="${email}"></strong>
            </p>

            <form method="post" action="/verify-otp">
                <input type="hidden" name="email" th:value="${email}"/>

                <div class="mb-3">
                    <label class="form-label">Enter OTP Code</label>
                    <input type="text" name="otp" class="form-control text-center fs-4"
                           required maxlength="6"
                           placeholder="Enter 6-digit OTP"/>
                </div>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <button type="submit" class="btn btn-primary w-100">Verify</button>
            </form>

            <div class="text-center mt-3">
                <a th:href="@{/register}" class="text-muted small">Back to Register</a>
            </div>

        </div>
    </div>
</div>

<script th:src="@{/assets/js/bootstrap.bundle.js}"></script>
</body>
</html>

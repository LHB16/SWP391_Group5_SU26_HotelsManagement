<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragment/frag :: head}"></head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragment/frag :: navBar}"></nav>

<main class="flex-grow-1 d-flex align-items-center py-5">
<div class="container d-flex justify-content-center">
    <div class="card shadow" style="width: 420px;">
        <div class="card-header bg-primary text-white text-center">
            <h4 class="mb-0">System Login</h4>
        </div>
        <div class="card-body p-4">

            <div th:if="${param.error}" class="alert alert-danger">
                Invalid username or password!
            </div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div th:if="${param.registered}" class="alert alert-success">
                Registration successful! Please log in.
            </div>
            <div th:if="${param.passwordReset}" class="alert alert-success">
                Password reset successful! Please log in.
            </div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <form method="post" th:action="@{/login}">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username"
                           class="form-control"
                           placeholder="Enter your username..."
                           required/>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password"
                           class="form-control"
                           placeholder="Enter your password..."
                           required/>
                </div>

                <button type="submit" class="btn btn-primary w-100">Login</button>

                <div class="text-center mt-2">
                    <a th:href="@{/forgot-password}" class="text-muted small">Forgot password?</a>
                </div>
            </form>

            <div class="text-center mt-3">
                <span class="text-muted small">Don't have an account?
                    <a th:href="@{/register}">Register here</a>
                </span>
            </div>

        </div>
    </div>
</div>
</main>

<footer th:replace="~{fragment/frag :: footer}"></footer>
<div th:replace="~{fragment/frag :: scripts}"></div>
</body>
</html>

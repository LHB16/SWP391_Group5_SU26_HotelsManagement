<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Reset Password</title>
    <link th:href="@{/assets/css/bootstrap.css}" rel="stylesheet"/>
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow" style="width: 420px;">
        <div class="card-header bg-primary text-white text-center">
            <h4 class="mb-0">Reset Password</h4>
        </div>
        <div class="card-body p-4">

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form method="post" th:action="@{/reset-password}">
                <input type="hidden" name="email" th:value="${email}"/>

                <div class="mb-3">
                    <label for="newPassword" class="form-label">New Password</label>
                    <input type="password" id="newPassword" name="newPassword"
                           class="form-control"
                           placeholder="Enter new password..."
                           required/>
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword"
                           class="form-control"
                           placeholder="Re-enter new password..."
                           required/>
                    <div id="matchError" class="text-danger small mt-1" style="display:none;">
                        Passwords do not match!
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Reset Password</button>
            </form>

        </div>
    </div>
</div>



<script th:src="@{/assets/js/bootstrap.bundle.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragment/frag :: head}"></head>
<body class="bg-light d-flex flex-column" style="min-height: 100vh;">
<nav th:replace="~{fragment/frag :: navBar}"></nav>

<div class="container d-flex justify-content-center align-items-center flex-grow-1">
    <div class="card shadow" style="width: 420px;">
        <div class="card-header login-header text-center">
            <h4 class="mb-0">Reset Password</h4>
        </div>
        <div class="card-body p-4">

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form method="post" th:action="@{/reset-password}" onsubmit="return checkPassword()">
                <input type="hidden" name="email" th:value="${email}"/>

                <div class="mb-3">
                    <label for="newPassword" class="form-label">New Password</label>
                    <div class="input-group">
                        <input type="password" id="newPassword" name="newPassword"
                               class="form-control"
                               placeholder="Enter new password..."
                               required/>
                        <button type="button" class="btn password-toggle-btn"
                                onclick="togglePasswordVisibility('newPassword', 'toggleNewPasswordIcon')">
                            <i class="bi bi-eye-slash" id="toggleNewPasswordIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <input type="password" id="confirmPassword"
                               class="form-control"
                               placeholder="Re-enter new password..."
                               required/>
                        <button type="button" class="btn password-toggle-btn"
                                onclick="togglePasswordVisibility('confirmPassword', 'toggleConfirmPasswordIcon')">
                            <i class="bi bi-eye-slash" id="toggleConfirmPasswordIcon"></i>
                        </button>
                    </div>
                    <div id="matchError" class="text-danger small mt-1" style="display:none;">
                        Passwords do not match!
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100">Reset Password</button>
            </form>

        </div>
    </div>
</div>

<script>
    function checkPassword() {
        const pwd = document.getElementById("newPassword").value;
        const confirm = document.getElementById("confirmPassword").value;
        if (pwd !== confirm) {
            document.getElementById("matchError").style.display = "block";
            return false;
        }
        return true;
    }
</script>

<footer th:replace="~{fragment/frag :: footer}"></footer>
<div th:replace="~{fragment/frag :: scripts}"></div>
</body>
</html>
